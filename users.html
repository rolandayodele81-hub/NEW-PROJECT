<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Users — PSE PDMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/app.js"></script>
  <script>
    PDMS.mountShell('users');
    const D = PDMS_DATA; const I = PDMS.icon;
    const DEFAULT_PASSWORD = 'Welcome@123';
    document.getElementById('content').innerHTML = `
  <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Users</span></div>
    <h1 class="page-title">Users & Staff</h1><div class="page-sub">Manage employees, roles and access</div></div>
    <div class="flex gap-2">${PDMS.can('Onboard User') ? `<button class="btn btn-primary" onclick="newUser()">${I('user-plus')} Add User</button>` : ''}</div></div>
  <div class="grid grid-4 mb-4">
    <div class="stat i-primary"><div class="label">Total Users</div><div class="value">${D.users.length}</div><div class="icon-wrap">${I('users')}</div></div>
    <div class="stat i-success"><div class="label">Active</div><div class="value">${D.users.filter(u => u.status === 'Active').length}</div><div class="icon-wrap">${I('check')}</div></div>
    <div class="stat i-warn"><div class="label">On Leave</div><div class="value">${D.users.filter(u => u.status === 'On Leave').length}</div><div class="icon-wrap">${I('clock')}</div></div>
    <div class="stat i-info"><div class="label">Suspended</div><div class="value">${D.users.filter(u => u.status === 'Suspended').length}</div><div class="icon-wrap">${I('shield')}</div></div>
  </div>
  <div id="tbl" class="table-wrap"></div>
`;
    function renderUsers() {
      document.getElementById('tbl').innerHTML = '';
      PDMS.renderTable(document.getElementById('tbl'), {
        columns: [
          { key: 'name', label: 'User', render: r => `<div class="flex items-center gap-2"><div class="avatar avatar-sm">${PDMS.initials(r.name)}</div><div><div class="font-semi">${PDMS.esc(r.name)}</div><div class="text-sm text-muted">${PDMS.esc(r.email)}</div></div></div>` },
          { key: 'role', label: 'Role', render: r => `<span class="badge badge-primary">${r.role}</span>` },
          { key: 'dept', label: 'Department' },
          { key: 'workload', label: 'Workload', render: r => `<div class="progress-inline"><div class="progress"><div class="bar" style="width:${r.workload}%"></div></div><span class="pct">${r.workload}%</span></div>` },
          { key: 'joined', label: 'Joined' },
          { key: 'actions', label: 'Actions', render: r => `<div class="flex gap-2"><button class="btn btn-secondary btn-sm" onclick="editU('${r.id}')">Edit</button></div>` }
        ],
        rows: D.users, pageSize: 10, searchKeys: ['name', 'email', 'role', 'dept'],
        filterOptions: [{ key: 'role', label: 'Role', options: D.roles }]
      });
    }

    function newUser() {
      const modal = PDMS.modal('Create User', `<div class="form-grid"><div class="form-row"><label>Full Name</label><input id="newUserName"/></div><div class="form-row"><label>Email</label><input id="newUserEmail" type="email"/></div><div class="form-row"><label>Role</label><select id="newUserRole">${D.roles.map(r => `<option>${r}</option>`).join('')}</select></div><div class="form-row"><label>Department</label><input id="newUserDept" type="text" placeholder="e.g. Cyber Security"/></div></div>`,
        `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="createUserBtn">Create</button>`);
      modal.querySelector('#createUserBtn').onclick = function () {
        const name = modal.querySelector('#newUserName').value.trim();
        const email = modal.querySelector('#newUserEmail').value.trim().toLowerCase();
        const role = modal.querySelector('#newUserRole').value;
        const dept = modal.querySelector('#newUserDept').value.trim();
        if (!name || !email) {
          PDMS.toast('Missing user info', 'Name and email are required', 'error');
          return;
        }
        const record = { name, email, role, dept, password: DEFAULT_PASSWORD, workload: 0, phone: '', joined: new Date().toISOString().slice(0, 10) };
        PDMS.api.register(record).then(saved => {
          D.users.unshift(saved);
          modal.remove();
          showNewUserPasswordNote(saved);
          renderUsers();
        }).catch(err => PDMS.toast('Error', err.message || 'Could not create user', 'error'));
      };
    }

    function showNewUserPasswordNote(user) {
      const modal = PDMS.modal('User created', `
        <p class="text-sm text-muted" style="margin-bottom:16px">${PDMS.esc(user.name)}'s account was created with a temporary password. Share it with them securely and ask them to change it the moment they sign in.</p>
        <div style="text-align:center;padding:18px;background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;font-size:20px;font-weight:800;letter-spacing:1px;color:var(--primary)">${PDMS.esc(DEFAULT_PASSWORD)}</div>
      `, `<button class="btn btn-primary w-full" data-close>Got it</button>`);
      modal.querySelector('.modal').classList.add('modal-sm');
    }

    function toggleUserStatus(id) {
      const user = D.users.find(u => u.id === id);
      if (!user) return;
      const nextStatus = user.status === 'Active' ? 'Suspended' : 'Active';
      PDMS.api.update('users', id, { status: nextStatus }).then(saved => {
        Object.assign(user, saved);
        PDMS.toast('Status updated', `${user.name} is now ${user.status}`, 'success');
        renderUsers();
      }).catch(err => PDMS.toast('Error', err.message || 'Could not update user', 'error'));
    }

    function editU(id) {
      PDMS.toast('Editing', 'User editor opened', 'success');
    }
    window.newUser = newUser; window.editU = editU;
    PDMS.onRefresh(renderUsers);
  </script>
</body>

</html>
