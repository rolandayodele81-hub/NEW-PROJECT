<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSE PDMS — Sign in</title>
  <meta name="description" content="PSE PDMS — Project Delivery Management System for enterprise teams." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="login-page">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="brand">
        <div class="brand-logo" style="height:64px"><img src="images/pse-logo.png" alt="PSE PDMS Logo" /></div>
      </div>
      <div>
        <h1>Deliver every project with clarity, speed, and control.</h1>
        <p>The complete project delivery platform for your organization.</p>
        <div class="auth-features">
          <div class="f">
            <div class="fi">✓</div>
            <div>Real-time visibility across 100+ live engagements</div>
          </div>
          <div class="f">
            <div class="fi">✓</div>
            <div>Role-based access for eight enterprise personas</div>
          </div>
          <div class="f">
            <div class="fi">✓</div>
            <div>Beautiful reporting, messaging, and audit logs</div>
          </div>
        </div>
      </div>
      <footer>© 2026 PSE PDMS</footer>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-form">
        <div id="authBox"></div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/api.js"></script>
  <script>
    const authBox = document.getElementById('authBox');

    function renderLoginForm() {
      authBox.innerHTML = `
    <h2>Welcome back</h2>
    <p class="sub">Sign in with your corporate credentials.</p>
    <form id="loginForm">
      <div class="form-row"><label>Work email</label><input type="email" id="email" placeholder="name@company.com" required/></div>
      <div class="form-row"><label>Password</label><input type="password" id="password" placeholder="Enter your password" required/></div>
      <button class="btn btn-primary w-full" type="submit">Sign in</button>
      <div class="form-actions"><a href="forgot.html">Forgot password?</a></div>
    </form>
    <div class="auth-note">Accounts are provisioned by HR and system administrators only.</div>
  `;
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const user = await PDMS.authenticate(email, password);
        PDMS.setUser(user);
        PDMS.toast('Welcome', 'Logging you in...', 'success');
        setTimeout(() => location.href = PDMS.dashboardFor(user), 600);
      } catch (err) {
        PDMS.toast('Authentication failed', err.message || 'Invalid login credentials.', 'error');
      }
    }

    renderLoginForm();
  </script>
</body>

</html>
