<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Search — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('');
const D=PDMS_DATA;
const q = (new URLSearchParams(location.search).get('q')||'').toLowerCase();
const match = (s)=>String(s).toLowerCase().includes(q);

function render(){
const projects=D.projects.filter(p=>match(p.name)||match(p.id)||match(p.client)).slice(0,10);
const users=D.users.filter(u=>match(u.name)||match(u.email)).slice(0,10);
const clients=D.clients.filter(c=>match(c.name)).slice(0,10);
const consultants=D.consultants.filter(c=>match(c.name)||match(c.specialty)).slice(0,10);

document.getElementById('content').innerHTML=`
  <div class="page-head"><div>
    <div class="breadcrumbs"><span>Home</span><span>Search</span></div>
    <h1 class="page-title">Results for "${PDMS.esc(q)}"</h1>
    <div class="page-sub">${projects.length+users.length+clients.length+consultants.length} matches</div></div></div>
  <div class="grid grid-2">
    <div class="card"><div class="card-head"><div class="card-title">Projects (${projects.length})</div></div><div class="card-body" style="padding:6px 20px">${projects.map(p=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><a href="project-details.html#id=${p.id}" class="font-semi">${PDMS.esc(p.name)}</a><div class="text-sm text-muted">${p.id} • ${PDMS.esc(p.client)}</div></div>`).join('')||'<div class="text-muted">None</div>'}</div></div>
    <div class="card"><div class="card-head"><div class="card-title">Users (${users.length})</div></div><div class="card-body" style="padding:6px 20px">${users.map(u=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center"><div class="avatar avatar-sm">${PDMS.initials(u.name)}</div><div><div class="font-semi">${PDMS.esc(u.name)}</div><div class="text-sm text-muted">${PDMS.esc(u.email)}</div></div></div>`).join('')||'<div class="text-muted">None</div>'}</div></div>
    <div class="card"><div class="card-head"><div class="card-title">Clients (${clients.length})</div></div><div class="card-body" style="padding:6px 20px">${clients.map(c=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="font-semi">${PDMS.esc(c.name)}</div><div class="text-sm text-muted">${PDMS.esc(c.industry)}</div></div>`).join('')||'<div class="text-muted">None</div>'}</div></div>
    <div class="card"><div class="card-head"><div class="card-title">Consultants (${consultants.length})</div></div><div class="card-body" style="padding:6px 20px">${consultants.map(c=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div class="font-semi">${PDMS.esc(c.name)}</div><div class="text-sm text-muted">${PDMS.esc(c.specialty)}</div></div>`).join('')||'<div class="text-muted">None</div>'}</div></div>
  </div>`;
}
PDMS.onRefresh(render);
</script></body></html>
