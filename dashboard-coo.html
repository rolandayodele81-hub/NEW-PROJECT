<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>COO Dashboard — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('dashboard');
const D=PDMS_DATA;const I=PDMS.icon;
function render(){
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Dashboard</span><span>COO</span></div>
    <h1 class="page-title">Chief Operating Officer</h1><div class="page-sub">Enterprise-wide operations command center</div></div></div>
  <div class="grid grid-4 mb-4">
    ${[['Revenue YTD','$12.4M','primary','trending'],['Op. Efficiency','94%','success','check'],['Backlog','32','warn','clock'],['Client NPS','62','info','zap']].map(([k,v,c,i])=>`
      <div class="stat i-${c}"><div class="label">${k}</div><div class="value">${v}</div><div class="delta up">${I('trending')} +8%</div><div class="icon-wrap">${I(i)}</div></div>`).join('')}
  </div>
  <div class="grid grid-2">
    <div class="card"><div class="card-head"><div class="card-title">Revenue by Department</div></div><div class="card-body"><div class="chart-wrap" style="height:280px"><canvas id="c1"></canvas></div></div></div>
    <div class="card"><div class="card-head"><div class="card-title">Operational KPIs</div></div><div class="card-body">
      ${[['On-time Delivery',92],['Consultant Utilization',78],['Client Satisfaction',88],['Budget Adherence',94]].map(([k,v])=>`
        <div class="mb-3"><div class="flex justify-between mb-2"><span class="font-semi text-sm">${k}</span><span class="font-bold">${v}%</span></div><div class="progress"><div class="bar" style="width:${v}%"></div></div></div>`).join('')}
    </div></div>
  </div>`;
PDMS.charts.bar(document.getElementById('c1'),[1200,900,1600,2100,1400,800,1900],['Eng','Design','Ops','PM','Sales','QA','Cloud'],'#10b981');
}
PDMS.onRefresh(render);
</script></body></html>
