<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>COO Dashboard — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/>
<style>
.coo-hero {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  gap: 20px;
  padding: 24px 26px;
  border-radius: 28px;
  background: linear-gradient(135deg, #090d16 0%, #1d3c88 40%, #8b5cf6 75%, #ec4899 100%);
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(29, 60, 136, 0.25);
  margin-bottom: 24px;
}
.coo-hero::before {
  content: "";
  position: absolute;
  inset: -20% -10% auto auto;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0) 70%);
  filter: blur(10px);
  animation: drift 8s ease-in-out infinite alternate;
}
.coo-hero-copy { position: relative; z-index: 1; }
.coo-hero-card {
  position: relative; z-index: 1; display: flex; align-items: center; gap: 16px; padding: 18px; border-radius: 20px;
  background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.18);
}
@keyframes drift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-20px,-10px,0)}}
@media(max-width:900px){
  .coo-hero { grid-template-columns: 1fr; }
  .coo-hero-card { margin-top: 8px; }
}
</style>
</head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('dashboard');
const D=PDMS_DATA;const I=PDMS.icon;
const DEFAULT_PASSWORD = 'Welcome@123';

function render(){
  const totalRevenue = D.clients.reduce((acc, curr) => acc + (curr.revenue || 0), 0);
  const openProjects = D.projects.filter(p=>p.status!=='Completed'&&p.status!=='Closed'&&p.status!=='Cancelled').length;
  
  // Sales pipeline
  const pipelineProjects = D.projects.filter(p=>['Incoming','Approved'].includes(p.status));
  const pipelineValue = pipelineProjects.reduce((acc, curr) => acc + (curr.budget || 0), 0);
  const incomingDeals = D.projects.filter(p=>p.status==='Incoming').length;
  const approvedDeals = D.projects.filter(p=>p.status==='Approved').length;
  
  // Bench utilization
  const totalConsultants = D.consultants.length;
  const activeConsultants = D.consultants.filter(c=>c.availability!=='Available').length;
  const utilization = Math.round((activeConsultants / Math.max(totalConsultants, 1)) * 100);
  
  const pmsList = D.users.filter(u=>u.role==='Project Manager').map(u=>u.name).concat(['TBD']);
  const leadsList = D.users.filter(u=>u.role==='Project Manager' || u.role==='Consultant').map(u=>u.name).concat(['TBD']);
  
  document.getElementById('content').innerHTML=`
    <div class="coo-hero">
      <div class="coo-hero-copy">
        <div class="hero-pill">Operations Command • Financials & Efficiency</div>
        <h1 class="page-title" style="font-size:30px;line-height:1.1;margin-top:10px">Enterprise Operations & Delivery Console</h1>
        <p class="page-sub" style="font-size:14px;max-width:640px; color:rgba(255,255,255,.9);margin-top:8px">Analyze corporate revenue, review client portfolios, execute governance, and onboard leadership resources.</p>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="newUser()">${I('user-plus')} Onboard Leadership</button>
          <button class="btn btn-secondary" onclick="newProject()">${I('plus')} Launch Project</button>
          <a class="btn btn-secondary" href="reports.html" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.18)">${I('chart')} View Reports</a>
        </div>
      </div>
      <div class="coo-hero-card">
        <div class="ring" style="--p:94;--sz:92px;--th:8px;--c:#ec4899"><span class="ring-val">94%</span></div>
        <div>
          <div class="hero-card-title">Op. Efficiency</div>
          <div class="hero-card-text">Corporate project execution meets our key service level agreements.</div>
          <div class="hero-card-foot">Target met</div>
        </div>
      </div>
    </div>

    <div class="grid grid-4 mb-4">
      <div class="stat i-success">
        <div class="label">Total Revenue YTD</div>
        <div class="value" style="font-size:24px;margin-top:10px">${PDMS.money(totalRevenue)}</div>
        <div class="delta up">${I('trending')} +14.2% YoY</div>
        <div class="icon-wrap">${I('chart')}</div>
      </div>
      <div class="stat i-primary">
        <div class="label">Active Backlog</div>
        <div class="value">${openProjects}</div>
        <div class="delta up">Open client engagements</div>
        <div class="icon-wrap">${I('folder')}</div>
      </div>
      <div class="stat i-info">
        <div class="label">Client Partners</div>
        <div class="value">${D.clients.length}</div>
        <div class="delta up">Active enterprises</div>
        <div class="icon-wrap">${I('globe')}</div>
      </div>
      <div class="stat i-purple">
        <div class="label">Resource Utilization</div>
        <div class="value">${utilization}%</div>
        <div class="delta up">${activeConsultants} of ${totalConsultants} active</div>
        <div class="icon-wrap">${I('users')}</div>
      </div>
    </div>

    <div class="grid grid-3 mb-4">
      <div class="stat i-pink">
        <div class="label">Pipeline Value</div>
        <div class="value" style="font-size:22px;margin-top:10px">${PDMS.money(pipelineValue)}</div>
        <div class="delta up">${pipelineProjects.length} deals in motion</div>
        <div class="icon-wrap">${I('trending')}</div>
      </div>
      <div class="stat i-success">
        <div class="label">Approved Deals</div>
        <div class="value">${approvedDeals}</div>
        <div class="delta up">Ready for delivery</div>
        <div class="icon-wrap">${I('check')}</div>
      </div>
      <div class="stat i-warn">
        <div class="label">Incoming Deals</div>
        <div class="value">${incomingDeals}</div>
        <div class="delta down">Awaiting confirmation</div>
        <div class="icon-wrap">${I('clock')}</div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-head">
        <div>
          <div class="card-title">Sales Project Pipeline</div>
          <div class="card-sub">Active inbound and approved projects for review and assignment.</div>
        </div>
        <a class="btn btn-secondary btn-sm" href="projects.html">Open Projects</a>
      </div>
      <div class="card-body" style="padding:0">
        <div style="overflow-x:auto">
          <table class="data">
            <thead>
              <tr>
                <th>Project</th>
                <th>Client</th>
                <th>Status</th>
                <th>PM</th>
                <th>Lead</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${D.projects.slice(0,8).map(p=>`
                <tr>
                  <td><a href="project-details.html?id=${p.id}" class="font-semi" style="color:var(--primary)">${PDMS.esc(p.name)}</a></td>
                  <td>${PDMS.esc(p.client)}</td>
                  <td><span class="badge badge-${D.statusColors[p.status]||'muted'}">${PDMS.esc(p.status)}</span></td>
                  <td>${PDMS.esc(p.pm||'TBD')}</td>
                  <td>${PDMS.esc(p.lead||'TBD')}</td>
                  <td><button class="btn btn-secondary btn-sm" onclick="manageConsultants('${p.id}')">Assign staff</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="grid grid-2 mb-4">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Sales Project Pipeline</div>
            <div class="card-sub">Incoming and approved opportunities across delivery.</div>
          </div>
          <span class="badge badge-success">Pipeline</span>
        </div>
        <div class="card-body">
          <div class="stat i-pink">
            <div class="label">Pipeline Value</div>
            <div class="value" style="font-size:22px;margin-top:10px">${PDMS.money(pipelineValue)}</div>
            <div class="delta up">${pipelineProjects.length} deals in motion</div>
            <div class="icon-wrap">${I('trending')}</div>
          </div>
          <div class="flex gap-3 mt-4">
            <div class="stat i-success" style="flex:1;padding:18px 16px;min-height:132px;">
              <div class="label">Approved Deals</div>
              <div class="value">${approvedDeals}</div>
            </div>
            <div class="stat i-warn" style="flex:1;padding:18px 16px;min-height:132px;">
              <div class="label">Incoming Deals</div>
              <div class="value">${incomingDeals}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Pipeline Summary</div>
            <div class="card-sub">Project velocity and forecast for the next quarter</div>
          </div>
          <a href="projects.html" class="btn btn-secondary btn-sm">Project Board</a>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:260px"><canvas id="c2"></canvas></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Sales Project Pipeline</div>
          <div class="card-sub">Review projects, assign PMs, leads, and consultants.</div>
        </div>
        <a class="btn btn-secondary btn-sm" href="projects.html">Full Projects</a>
      </div>
      <div class="card-body" style="padding:0">
        <div style="overflow-x:auto">
          <table class="data">
            <thead>
              <tr>
                <th>Project ID</th>
                <th>Project Name</th>
                <th>Client Partner</th>
                <th>Status</th>
                <th>PM</th>
                <th>Lead</th>
                <th>Consultants</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${D.projects.map(p=>`
                <tr>
                  <td><a href="project-details.html?id=${p.id}" class="font-semi" style="color:var(--primary)">${p.id}</a></td>
                  <td class="font-bold">${PDMS.esc(p.name)}</td>
                  <td>${PDMS.esc(p.client)}</td>
                  <td>
                    <select class="staffing-select" onchange="updateProjectField('${p.id}', 'status', this.value)">
                      ${D.statuses.map(s=>`<option value="${s}" ${s===p.status?'selected':''}>${s}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <select class="staffing-select" onchange="updateProjectField('${p.id}', 'pm', this.value)">
                      ${pmsList.map(pm=>`<option value="${pm}" ${pm===p.pm?'selected':''}>${PDMS.esc(pm)}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <select class="staffing-select" onchange="updateProjectField('${p.id}', 'lead', this.value)">
                      ${leadsList.map(ld=>`<option value="${PDMS.esc(ld)}" ${ld===p.lead?'selected':''}>${PDMS.esc(ld)}</option>`).join('')}
                    </select>
                  </td>
                  <td>
                    <div style="display:flex;flex-wrap:wrap;gap:4px;max-width:200px">
                      ${(p.consultants||[]).map(c=>`<span class="badge badge-info" style="font-size:10px">${PDMS.esc(c)}</span>`).join('')}
                      ${(p.consultants||[]).length===0?'<span class="text-muted text-sm">None</span>':''}
                    </div>
                  </td>
                  <td>
                    <button class="btn btn-secondary btn-sm" onclick="manageConsultants('${p.id}')">Manage Staff</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 20px">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Corporate Revenue by Dept</div>
            <div class="card-sub">Budget volume allocations (in Thousands USD)</div>
          </div>
          <span class="badge badge-success">Financials</span>
        </div>
        <div class="card-body">
          <div class="chart-wrap" style="height:280px"><canvas id="c1"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Operational KPIs</div>
            <div class="card-sub">Performance indicators against annual objectives</div>
          </div>
          <span class="badge badge-info">Target 90%+</span>
        </div>
        <div class="card-body">
          ${[['On-time Project Delivery', 92], ['Consultant Utilization Rate', 78], ['Client Engagement NPS', 62], ['Budget Execution & Cost Control', 94]].map(([k,v])=>`
            <div class="mb-3">
              <div class="flex justify-between mb-2">
                <span class="font-semi text-sm">${k}</span>
                <span class="font-bold">${v}%</span>
              </div>
              <div class="progress">
                <div class="bar" style="width:${v}%; background:${v >= 90 ? 'var(--gradient-3)' : 'var(--gradient)'}"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 20px">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Client Portfolio Performance Matrix</div>
            <div class="card-sub">Enterprise client revenues and active project indicators</div>
          </div>
          <a href="clients.html" class="btn btn-secondary btn-sm">Full Ledger</a>
        </div>
        <div class="card-body" style="padding:0">
          <div style="overflow-x:auto">
            <table class="data">
              <thead>
                <tr>
                  <th>Client</th>
                  <th>Industry</th>
                  <th>Projects</th>
                  <th>NPS Status</th>
                  <th>Revenue YTD</th>
                </tr>
              </thead>
              <tbody>
                ${D.clients.map(c=>`
                  <tr>
                    <td>
                      <div class="flex items-center gap-2">
                        <div style="width:36px;height:36px;border-radius:10px;background:var(--gradient-3);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px">
                          ${c.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
                        </div>
                        <div>
                          <div class="font-semi">${PDMS.esc(c.name)}</div>
                          <div class="text-sm text-muted">Contact: ${PDMS.esc(c.contact)}</div>
                        </div>
                      </div>
                    </td>
                    <td><span class="badge badge-muted">${PDMS.esc(c.industry)}</span></td>
                    <td><span class="badge badge-primary">${c.projects} active</span></td>
                    <td><span class="badge badge-success dot">Healthy</span></td>
                    <td class="font-bold">${PDMS.money(c.revenue)}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-title">Enterprise Activity Logs</div>
        </div>
        <div class="card-body" style="padding:8px 20px">
          ${D.activities.slice(0, 5).map(a=>`
            <div class="activity">
              <div class="a-icon">${I('activity')}</div>
              <div>
                <div class="a-text"><b>${PDMS.esc(a.user)}</b> ${PDMS.esc(a.action)} <b>${PDMS.esc(a.target)}</b></div>
                <div class="a-time">${a.time}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
  
  // Render revenue bar chart (Engineering, Design, QA, Ops, PM, Sales, etc.)
  PDMS.charts.bar(document.getElementById('c1'), [1200, 900, 800, 1600, 2100, 1400], ['Eng', 'Design', 'QA', 'Ops', 'PM', 'Sales'], '#1d3c88');
}

function updateProjectField(projectId, field, value) {
  const project = D.projects.find(p=>p.id===projectId);
  if(!project) return;
  const patch = {};
  patch[field] = value;
  PDMS.api.update('projects', projectId, patch).then(saved => {
    Object.assign(project, saved);
    PDMS.toast('Project updated', `${projectId} ${field} set to ${value}`, 'success');
    render();
  }).catch(err => PDMS.toast('Error', err.message || 'Could not update project assignment', 'error'));
}

function manageConsultants(projectId) {
  const project = D.projects.find(p=>p.id===projectId);
  if(!project) return;
  const current = project.consultants || [];
  const listHtml = D.consultants.map(c => {
    const checked = current.includes(c.name) ? 'checked' : '';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <input type="checkbox" id="c-${c.id}" value="${PDMS.esc(c.name)}" ${checked} style="width:16px;height:16px"/>
        <label for="c-${c.id}" class="flex items-center gap-2" style="cursor:pointer;flex:1">
          <div class="avatar avatar-sm">${PDMS.initials(c.name)}</div>
          <div>
            <div class="font-semi text-sm">${PDMS.esc(c.name)}</div>
            <div class="text-sm text-muted">${PDMS.esc(c.specialty)} · Load: ${c.workload}%</div>
          </div>
        </label>
      </div>`;
  }).join('');
  const modal = PDMS.modal(`Assign consultants to ${project.id}`, `
    <div style="max-height:300px;overflow-y:auto;padding-right:8px">
      ${listHtml}
    </div>
  `, `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveStaffBtn">${I('check')} Save Allocation</button>`);
  modal.querySelector('#saveStaffBtn').onclick = function() {
    const selected = [];
    modal.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => selected.push(cb.value));
    PDMS.api.update('projects', projectId, { consultants: selected }).then(saved => {
      Object.assign(project, saved);
      modal.remove();
      PDMS.toast('Consultants assigned', `Staff alignment saved for ${projectId}`, 'success');
      render();
    }).catch(err => PDMS.toast('Error', err.message || 'Could not save consultants', 'error'));
  };
}

function newProject() {
  const modal = PDMS.modal('Create New Project', `
    <div class="form-grid">
      <div class="form-row"><label>Project Name</label><input id="newProjName" placeholder="e.g. Falcon Migration"/></div>
      <div class="form-row"><label>Client</label><select id="newProjClient">${D.clients.map(c=>`<option>${PDMS.esc(c.name)}</option>`).join('')}</select></div>
      <div class="form-row"><label>Type</label><select id="newProjType"><option>Software Development</option><option>Consulting</option><option>Infrastructure</option></select></div>
      <div class="form-row"><label>Priority</label><select id="newProjPriority">${D.priorities.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="form-row"><label>Start Date</label><input id="newProjStart" type="date"/></div>
      <div class="form-row"><label>Due Date</label><input id="newProjDue" type="date"/></div>
      <div class="form-row"><label>Budget (USD)</label><input id="newProjBudget" type="number" placeholder="250000"/></div>
      <div class="form-row"><label>Department</label><select id="newProjDept">${D.departments.map(d=>`<option>${PDMS.esc(d.name)}</option>`).join('')}</select></div>
    </div>
    <div class="form-row"><label>Description</label><textarea id="newProjDesc" rows="3" placeholder="Scope, goals, deliverables..."></textarea></div>
  `, `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="createProjectBtn">${I('plus')} Create Project</button>`);
  modal.querySelector('#createProjectBtn').onclick = function(){
    const name = modal.querySelector('#newProjName').value.trim();
    const client = modal.querySelector('#newProjClient').value;
    const type = modal.querySelector('#newProjType').value;
    const priority = modal.querySelector('#newProjPriority').value;
    const start = modal.querySelector('#newProjStart').value;
    const due = modal.querySelector('#newProjDue').value;
    const budget = Number(modal.querySelector('#newProjBudget').value)||0;
    const dept = modal.querySelector('#newProjDept').value;
    const desc = modal.querySelector('#newProjDesc').value.trim();
    if(!name || !client){
      PDMS.toast('Missing project info','Project name and client are required','error');
      return;
    }
    const record = {
      name, client, type, dept, sales:PDMS.getUser() ? PDMS.getUser().name : 'TBD', pm:'TBD', lead:'TBD', consultants:[],
      priority, budget, status:'Incoming', progress:0, start:start||'', due:due||'', completion:null,
      description:desc, files:0, remarks:0
    };
    PDMS.api.create('projects', record).then(saved => {
      D.projects.unshift(saved);
      modal.remove();
      PDMS.toast('Project created', 'New project added to pipeline', 'success');
      render();
    }).catch(err => PDMS.toast('Error', err.message || 'Could not create project', 'error'));
  };
}

window.updateProjectField = updateProjectField;
window.manageConsultants = manageConsultants;
window.newProject = newProject;

function newUser() {
  const modal = PDMS.modal('Onboard New Executive User', `
    <div class="form-grid">
      <div class="form-row"><label>Full Name</label><input id="newUserName" placeholder="Jane Smith"/></div>
      <div class="form-row"><label>Email</label><input id="newUserEmail" type="email" placeholder="jane.smith@pse.com"/></div>
      <div class="form-row"><label>Role</label><select id="newUserRole">${D.roles.map(r => `<option value="${r}">${r}</option>`).join('')}</select></div>
      <div class="form-row"><label>Department</label><input id="newUserDept" type="text" placeholder="e.g. Operations"/></div>
    </div>
  `, `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="createUserBtn">${I('check')} Onboard</button>`);
  
  modal.querySelector('#createUserBtn').onclick = function () {
    const name = modal.querySelector('#newUserName').value.trim();
    const email = modal.querySelector('#newUserEmail').value.trim().toLowerCase();
    const role = modal.querySelector('#newUserRole').value;
    const dept = modal.querySelector('#newUserDept').value.trim();
    if (!name || !email) {
      PDMS.toast('Missing user info', 'Name and email are required', 'error');
      return;
    }
    const record = { name, email, role, dept, password: DEFAULT_PASSWORD, workload: 0, phone: '', joined: new Date().toISOString().slice(0, 10), status: 'Active' };
    PDMS.api.register(record).then(saved => {
      D.users.unshift(saved);
      modal.remove();
      showNewUserPasswordNote(saved);
      render();
    }).catch(err => PDMS.toast('Error', err.message || 'Could not onboard user', 'error'));
  };
}

function showNewUserPasswordNote(user) {
  const modal = PDMS.modal('User Onboarded Successfully', `
    <p class="text-sm text-muted" style="margin-bottom:16px">The account for ${PDMS.esc(user.name)} is active. Here is their temporary login password:</p>
    <div style="text-align:center;padding:18px;background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;font-size:20px;font-weight:800;letter-spacing:1px;color:var(--primary)">${PDMS.esc(DEFAULT_PASSWORD)}</div>
  `, `<button class="btn btn-primary w-full" data-close>Got it</button>`);
  modal.querySelector('.modal').classList.add('modal-sm');
}

window.newUser = newUser;

PDMS.onRefresh(render);
</script></body></html>
