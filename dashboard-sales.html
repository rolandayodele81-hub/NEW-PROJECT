<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sales Dashboard — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('dashboard');
const D=PDMS_DATA;const I=PDMS.icon;
function render(){
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Dashboard</span><span>Sales</span></div>
    <h1 class="page-title">Sales Dashboard</h1><div class="page-sub">Pipeline, incoming deals and client health</div></div>
    <button class="btn btn-primary">${I('plus')} New Deal</button></div>
  <div class="grid grid-4 mb-4">
    ${[['Pipeline','$8.2M','primary'],['This Month','$1.4M','success'],['Deals Open','24','warn'],['Won Rate','62%','info']].map(([k,v,c])=>`
      <div class="stat i-${c}"><div class="label">${k}</div><div class="value">${v}</div><div class="icon-wrap">${I('trending')}</div></div>`).join('')}
  </div>
  <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px">
    <div class="card"><div class="card-head"><div class="card-title">Deals Pipeline</div></div><div class="card-body"><div class="chart-wrap" style="height:260px"><canvas id="c1"></canvas></div></div></div>
    <div class="card"><div class="card-head"><div class="card-title">Top Clients</div></div>
      <div class="card-body" style="padding:8px 20px">${D.clients.slice(0,6).map(c=>`
        <div class="flex items-center gap-3" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:36px;height:36px;border-radius:10px;background:var(--gradient-2);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px">${c.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div style="flex:1"><div class="font-semi text-sm">${PDMS.esc(c.name)}</div><div class="text-sm text-muted">${c.projects} projects</div></div>
          <div class="font-bold">${PDMS.money(c.revenue)}</div></div>`).join('')}</div></div>
  </div>`;
PDMS.charts.line(document.getElementById('c1'),[[400,550,720,680,890,950,1100,1050,1250,1400,1350,1500]],['J','F','M','A','M','J','J','A','S','O','N','D'],['#f59e0b']);
}
PDMS.onRefresh(render);
</script></body></html>
