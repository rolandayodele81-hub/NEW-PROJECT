<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Project Timeline — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('timeline');
const D=PDMS_DATA;const I=PDMS.icon;
const projects = D.projects.slice(0,20);
const days = 30;
const today = new Date();
document.getElementById('content').innerHTML = `
  <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Timeline</span></div>
    <h1 class="page-title">Project Timeline</h1><div class="page-sub">Gantt-style view of all active engagements</div></div></div>
  <div class="card"><div class="card-head"><div class="card-title">Delivery Roadmap</div>
    <div class="flex gap-2"><button class="btn btn-secondary btn-sm">${I('calendar')} Month</button><button class="btn btn-secondary btn-sm">Week</button></div></div>
    <div style="overflow-x:auto"><div style="min-width:900px;padding:16px 20px">
      <div style="display:grid;grid-template-columns:200px repeat(${days},1fr);gap:2px;margin-bottom:8px;font-size:10px;color:var(--text-muted);font-weight:600">
        <div>PROJECT</div>${Array.from({length:days},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()+i);return `<div style="text-align:center">${d.getDate()}</div>`}).join('')}
      </div>
      ${projects.map((p,idx)=>{
        const startOffset = idx%25;
        const dur = 5 + (idx%12);
        return `<div style="display:grid;grid-template-columns:200px 1fr;gap:8px;padding:6px 0;border-top:1px solid var(--border);align-items:center">
          <div><div class="font-semi text-sm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${PDMS.esc(p.name)}</div><div class="text-sm text-muted">${PDMS.esc(p.client)}</div></div>
          <div style="position:relative;height:26px;background:var(--surface-2);border-radius:6px">
            <div title="${PDMS.esc(p.name)} • ${p.progress}%" style="position:absolute;top:3px;bottom:3px;left:${(startOffset/days)*100}%;width:${(dur/days)*100}%;background:var(--gradient);border-radius:5px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:600;overflow:hidden">${p.progress}%</div>
          </div></div>`;
      }).join('')}
    </div></div>
  </div>
`;
</script></body></html>
