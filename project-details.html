<title>Project Details — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
// A hash survives any host's clean-URL rewriting untouched, since it's never
// sent to the server — unlike ?id=, which some static hosts strip on redirect.
window.addEventListener('hashchange', ()=>location.reload());
PDMS.mountShell('projects');
const D = PDMS_DATA; const I = PDMS.icon;
let p;

// Project issues are stored in D.issues — separate from D.reviews (the general
// community reviews page) so they never appear there.
function projectIssues(proj){
  if(!D.issues) D.issues = [];
  return D.issues.filter(r=>r.projectId===proj.id).slice().sort((a,b)=> new Date(b.time)-new Date(a.time));
}
function timeAgo(iso){
  if(!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs/60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return mins+'m ago';
  const hrs = Math.round(mins/60);
  if(hrs < 24) return hrs+'h ago';
  return Math.round(hrs/24)+'d ago';
}
function healthOf(proj){
  if(proj.status==='Completed') return {label:'Completed', cls:'badge-success'};
  if(proj.status==='Cancelled') return {label:'Cancelled', cls:'badge-danger'};
  if(proj.status==='Closed') return {label:'Closed', cls:'badge-primary'};
  if(proj.status==='On Hold') return {label:'On Hold', cls:'badge-muted'};
  const start = new Date(proj.start), due = new Date(proj.due), today = new Date();
  if(isNaN(start)||isNaN(due)||due<=start) return {label:'On Track', cls:'badge-success'};
  const expected = Math.min(100, Math.max(0, ((today-start)/(due-start))*100));
  const gap = expected - (proj.progress||0);
  if(gap > 25) return {label:'Delayed', cls:'badge-danger'};
  if(gap > 10) return {label:'At Risk', cls:'badge-warn'};
  return {label:'On Track', cls:'badge-success'};
}
function milestoneStages(proj){
  // 'Approved'/'Rejected'/'On Hold' are outcomes, not sequential steps — they
  // can't all sit in the same line at once. The timeline only ever walks the
  // main sequence, which normally ends at Approved (Sales) / Completed (Delivery).
  const isSales = PDMS.stageOf(proj)==='Sales';
  const mainSequence = isSales
    ? ['Incoming','Initial Contact','Requirement Gathering','Proposal Sent','Negotiation','PO / Award Granted','SLA Signed','Awaiting Client Approval','Closed']
    : ['Not Started','In Progress','Awaiting Review','Testing / Quality Assurance','Completed'];
  const status = proj.status;

  if(status==='Cancelled'){
    return mainSequence.map((label,i)=> i===mainSequence.length-1 ? {label:'Cancelled', state:'active'} : {label, state:'done'});
  }

  if(status==='On Hold'){
    // On Hold isn't a fixed slot — it can happen at any point, so position it
    // right after however far progress actually got, not at a fixed spot in the list.
    const stepsBeforeFinal = mainSequence.length-1;
    const doneCount = Math.min(stepsBeforeFinal, Math.floor(((proj.progress||0)/100)*stepsBeforeFinal));
    const result = mainSequence.slice(0,doneCount).map(label=>({label, state:'done'}));
    result.push({label:'On Hold', state:'active'});
    mainSequence.slice(doneCount).forEach(label=>result.push({label, state:''}));
    return result;
  }

  const currentIndex = mainSequence.indexOf(status);
  return mainSequence.map((label,i)=>{
    const state = currentIndex===-1 ? '' : i<currentIndex ? 'done' : i===currentIndex ? 'active' : '';
    return {label, state};
  });
}

function render(){
const hasProjects = Array.isArray(D.projects) && D.projects.length > 0;
const id = hasProjects ? new URLSearchParams(location.hash.replace(/^#/,'')).get('id') || D.projects[0].id : null;
p = hasProjects ? D.projects.find(x=>x.id===id) || D.projects[0] : null;

if(!p){
  document.getElementById('content').innerHTML = window.PDMS_REMOTE ? `
    <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Projects</span></div>
      <h1 class="page-title">No Project Data</h1><div class="page-sub">You currently do not have any project records.</div></div>
      <div class="flex gap-2"><a class="btn btn-primary" href="projects.html">Open Projects</a></div></div>
    <div class="card"><div class="card-body"><p class="text-muted">Add your own project data in <code>js/data.js</code> or use the template structure to populate this app.</p></div></div>
  ` : `
    <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Projects</span></div>
      <h1 class="page-title">Loading Project...</h1><div class="page-sub">Fetching your project data</div></div></div>
    <div class="card"><div class="card-body pdms-loading-inline"><span class="pdms-spinner"></span>Loading...</div></div>
  `;
} else {
  const user = PDMS.getUser();
  const health = healthOf(p);
  const stages = milestoneStages(p);
  const reviews = projectIssues(p);
  const latest = reviews[0];
  const canUpdate = PDMS.can('Add Remarks');
  const canUploadDoc = canUpdate && !(user && user.role==='HR');
  const canAssign = PDMS.can('Assign Consultant') && PDMS.stageOf(p)==='Delivery';
  const canManageStatus = PDMS.canManageStatus(p);
  const canStartDelivery = PDMS.can('Start Delivery') && PDMS.stageOf(p)==='Sales' && p.status==='Approved';

  document.getElementById('content').innerHTML = `
<div style="border-radius:20px;overflow:hidden;margin-bottom:24px;box-shadow:0 8px 32px rgba(29,60,136,.18)">
    <!-- Hero banner -->
    <div style="background:linear-gradient(135deg,#090d16 0%,#1d3c88 45%,#8b5cf6 80%,#ec4899 100%);padding:28px 28px 24px;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(139,92,246,.25) 0%,transparent 60%)"></div>
      <div style="position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap">
        <div style="flex:1;min-width:240px">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
            <span style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.6px">${p.id}</span>
            <span style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.6px">${PDMS.stageOf(p)==='Sales'?'SALES PIPELINE':'DELIVERY'}</span>
            <span class="badge badge-${D.statusColors[p.status]||'muted'}">${p.status}</span>
            <span class="badge ${health.cls}">${health.label}</span>
          </div>
          <h1 style="font-size:26px;font-weight:800;color:#fff;margin:0 0 6px;line-height:1.2;text-wrap:balance">${PDMS.esc(p.name)}</h1>
          <div style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:14px">${PDMS.esc(p.client||'—')} &nbsp;·&nbsp; ${PDMS.esc(p.type||'—')}</div>
          <p style="color:rgba(255,255,255,.65);font-size:13px;line-height:1.6;max-width:520px;margin:0">${PDMS.esc(p.description||'No description provided.')}</p>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;align-self:flex-start">
          ${canStartDelivery?`<button class="btn btn-primary" onclick="startDelivery()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff">${I('zap')} Start Delivery</button>`:''}
          ${canManageStatus?`<button class="btn btn-primary" onclick="changeStatus()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff">${I('refresh')} Change Status</button>`:''}
        </div>
      </div>
    </div>

    <!-- Metadata strip -->
    <div style="background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
      ${[
        {label:'Client', value: p.client||'—'},
        {label:'Workstream', value: p.workstream||p.dept||'—'},
        {label:'Start Date', value: p.start||'TBD'},
        {label:'Planned Completion', value: p.due||'TBD'},
        {label:'Actual Completion', value: p.actualCompletion||'—'},
      ].map((f,i,arr) => `
        <div style="padding:16px 20px;${i<arr.length-1?'border-right:1px solid var(--border)':''}">
          <div style="font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text-soft);text-transform:uppercase;margin-bottom:5px">${f.label}</div>
          <div style="font-size:14px;font-weight:600;color:var(--text)">${PDMS.esc(f.value)}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px">
    <div class="flex flex-col gap-4">
      <div class="card"><div class="card-head"><div class="card-title">Timeline</div></div>
        <div class="card-body">
          <div class="timeline">
            ${stages.map(s=>`<div class="tl-item ${s.state}"><div class="tl-title">${s.label}</div><div class="tl-meta">${s.state==='done'?'Completed':s.state==='active'?'Ongoing':'Upcoming'}</div></div>`).join('')}
          </div>
        </div>
      </div>

      <!-- Issues & Remarks — comment section style -->
      <div class="card" style="display:flex;flex-direction:column">
        <div class="card-head">
          <div><div class="card-title">Issues & Remarks</div><div class="card-sub">Visible only on this project</div></div>
        </div>
        <div style="padding:16px 20px;display:flex;flex-direction:column;gap:20px">

          ${canUpdate?`
          <!-- Chat input -->
          <div style="border:1px solid var(--border);border-radius:16px;background:var(--surface-2);display:flex;flex-direction:column;min-height:120px">
            <div style="flex:1"></div>
            <div style="display:flex;gap:10px;align-items:center;padding:10px 14px">
              <div class="avatar" style="width:32px;height:32px;font-size:12px;flex-shrink:0">${PDMS.initials((PDMS.getUser()||{}).name||'?')}</div>
              <textarea id="inlineIssue" rows="2" placeholder="Type an issue or remark…" style="flex:1;border:none;background:transparent;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;line-height:1.5;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitInlineIssue();}"></textarea>
              <button onclick="submitInlineIssue()" title="Send" style="background:var(--primary);color:#fff;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>`:''}

          <!-- Comments list -->
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px">${reviews.length} comment${reviews.length!==1?'s':''}</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              ${reviews.length ? reviews.map(r=>`
                <div style="display:flex;gap:12px;align-items:flex-start">
                  <div class="avatar" style="width:40px;height:40px;font-size:14px;flex-shrink:0">${PDMS.initials(r.author||'?')}</div>
                  <div style="flex:1;background:var(--surface-2);border-radius:10px;padding:12px 16px">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                      <span style="font-size:13px;font-weight:700;color:var(--primary)">${PDMS.esc(r.author||'Unknown')}</span>
                      <span style="font-size:11px;color:var(--text-soft)">${timeAgo(r.time)}</span>
                    </div>
                    <div style="font-size:13px;color:var(--text);line-height:1.6">${PDMS.esc(r.message)}</div>
                  </div>
                </div>`).join('') : `<div style="text-align:center;padding:24px 0;color:var(--text-muted);font-size:13px">${PDMS.emptyOrLoading('No comments yet — be the first to post.')}</div>`}
            </div>
          </div>

        </div>
      </div>
    </div>

    <div class="flex flex-col gap-4">
      <div class="card"><div class="card-head"><div class="card-title">Assignment</div></div>
        <div class="card-body">
          <div class="mb-3"><div class="text-sm text-muted">Project Manager</div><div class="flex items-center gap-2 mt-2">${p.pm?`<div class="avatar avatar-sm">${PDMS.initials(p.pm)}</div><div class="font-semi">${PDMS.esc(p.pm)}</div>`:`<div class="text-muted text-sm">Unassigned</div>`}</div></div>
          <div class="mb-3"><div class="text-sm text-muted">Project Lead</div><div class="flex items-center gap-2 mt-2">${p.lead?`<div class="avatar avatar-sm">${PDMS.initials(p.lead)}</div><div class="font-semi">${PDMS.esc(p.lead)}</div>`:`<div class="text-muted text-sm">Unassigned</div>`}</div></div>
          <div><div class="text-sm text-muted mb-2">Assigned Consultants (${p.consultants.length})</div>${p.consultants.map(c=>`<div class="flex items-center gap-2 mb-2"><div class="avatar avatar-sm">${PDMS.initials(c)}</div><div class="text-sm">${PDMS.esc(c)}</div></div>`).join('')||'<div class="text-muted text-sm">None assigned</div>'}</div>
          ${canAssign?`<button class="btn btn-secondary w-full mt-2" style="justify-content:center" onclick="assignTeam()">${I('user-plus')} Assign Team</button>`:''}
        </div>
      </div>
      <div class="card"><div class="card-head"><div class="card-title">Documents</div><div class="card-sub">Reports & project files</div>${canUploadDoc?`<button class="btn btn-secondary btn-sm" onclick="uploadDoc()">${I('upload')} Upload</button>`:''}</div>
        <div class="card-body" style="padding:8px 20px">
          <div class="text-muted text-sm" style="text-align:center;padding:24px 0">${PDMS.emptyOrLoading('No documents uploaded yet')}</div>
        </div>
      </div>
    </div>
  </div>
`;
}
}
PDMS.onRefresh(render);

function postProjectReview(){
  const modal = PDMS.modal('Post Issue / Remark',`
    <div class="form-row"><label>Issue or Concern</label><textarea id="prMessage" rows="4" placeholder="Describe the issue, concern or remark for this project..."></textarea></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="prSaveBtn">Post</button>`);
  modal.querySelector('#prSaveBtn').onclick = function(){
    const message = modal.querySelector('#prMessage').value.trim();
    if(!message){ PDMS.toast('Empty remark','Please write something first','error'); return; }
    const user = PDMS.getUser();
    if(!D.issues) D.issues = [];
    const record = {
      author: user?user.name:'Unknown', authorRole: user?user.role:'',
      projectId: p.id, projectName: p.name,
      message, time: new Date().toISOString()
    };
    PDMS.api.create('issues', record).then(saved=>{
      D.issues.unshift(saved);
      modal.remove();
      PDMS.toast('Posted','Your issue has been recorded','success');
      PDMS.notify('Project Issue', `${record.author} raised an issue on "${p.name}"`, 'message', 'project-details.html#id='+p.id);
      render();
    }).catch(err=>{ D.issues.unshift(record); modal.remove(); PDMS.toast('Saved locally','Issue recorded','success'); render(); });
  };
}
function submitInlineIssue(){
  const ta = document.getElementById('inlineIssue');
  if(!ta) return;
  const message = ta.value.trim();
  if(!message){ PDMS.toast('Empty remark','Please write something first','error'); return; }
  const user = PDMS.getUser();
  if(!D.issues) D.issues = [];
  const record = {
    author: user?user.name:'Unknown', authorRole: user?user.role:'',
    projectId: p.id, projectName: p.name,
    message, time: new Date().toISOString()
  };
  ta.value = '';
  PDMS.api.create('issues', record).then(saved=>{
    D.issues.unshift(saved);
    PDMS.toast('Posted','Your issue has been recorded','success');
    PDMS.notify('Project Issue', `${record.author} raised an issue on "${p.name}"`, 'message', 'project-details.html#id='+p.id);
    render();
  }).catch(()=>{ D.issues.unshift(record); PDMS.toast('Saved locally','Issue recorded','success'); render(); });
}
function assignTeam(){
  // State held in closure — avoids global pollution
  const state = {
    pm: p.pm||'',
    lead: p.lead||'',
    consultants: [...(p.consultants||[])]
  };
  const allUsers = D.users;

  function buildModal(){
    const chips = state.consultants.map(name=>`
      <span class="assign-chip">${PDMS.esc(name)}
        <button type="button" class="assign-chip-x" data-name="${PDMS.esc(name)}">×</button>
      </span>`).join('');
    return `
      <style>
        .assign-ac-wrap{position:relative}
        .assign-ac-wrap input{width:100%;box-sizing:border-box}
        .assign-ac-drop{position:absolute;top:100%;left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;display:none}
        .assign-ac-drop.open{display:block}
        .assign-ac-item{padding:8px 12px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}
        .assign-ac-item:hover,.assign-ac-item.focused{background:var(--primary-10,rgba(99,102,241,.08))}
        .assign-ac-avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
        .assign-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:10px}
        .assign-chip{display:inline-flex;align-items:center;gap:4px;background:var(--primary-10,rgba(99,102,241,.1));color:var(--primary);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:500}
        .assign-chip-x{background:none;border:none;cursor:pointer;color:var(--primary);font-size:16px;line-height:1;padding:0 0 0 2px}
      </style>
      <div class="form-grid">
        <div class="form-row">
          <label>Project Manager</label>
          <div class="assign-ac-wrap">
            <input id="assignPm" autocomplete="off" placeholder="Search by name…" value="${PDMS.esc(state.pm)}"/>
            <div class="assign-ac-drop" id="pmDrop"></div>
          </div>
        </div>
        <div class="form-row">
          <label>Project Lead</label>
          <div class="assign-ac-wrap">
            <input id="assignLead" autocomplete="off" placeholder="Search by name…" value="${PDMS.esc(state.lead)}"/>
            <div class="assign-ac-drop" id="leadDrop"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>Consultants</label>
        <div class="assign-chips" id="consultChips">${chips}</div>
        <div class="assign-ac-wrap">
          <input id="assignConsult" autocomplete="off" placeholder="Search and add consultants…"/>
          <div class="assign-ac-drop" id="consultDrop"></div>
        </div>
      </div>
    `;
  }

  const modal = PDMS.modal('Assign Team', buildModal(),
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveAssignBtn">Save Assignment</button>`);

  function acItem(name, role){
    return `<div class="assign-ac-item" data-name="${PDMS.esc(name)}"><div class="assign-ac-avatar">${PDMS.initials(name)}</div><div><div style="font-weight:600">${PDMS.esc(name)}</div><div style="font-size:12px;color:var(--text-muted)">${PDMS.esc(role||'')}</div></div></div>`;
  }
  function showDrop(drop, items, onPick){
    drop.innerHTML = items.map(u=>acItem(u.name, u.role)).join('') || '<div class="assign-ac-item" style="color:var(--text-muted)">No matches</div>';
    drop.classList.add('open');
    drop.querySelectorAll('.assign-ac-item[data-name]').forEach(el=>{
      el.onmousedown = e=>{ e.preventDefault(); onPick(el.dataset.name); };
    });
  }
  function hideDrop(drop){ drop.classList.remove('open'); }

  // PM autocomplete
  const pmInput = modal.querySelector('#assignPm');
  const pmDrop = modal.querySelector('#pmDrop');
  pmInput.oninput = ()=>{
    const q = pmInput.value.trim().toLowerCase();
    const matches = allUsers.filter(u=>u.name.toLowerCase().includes(q)).slice(0,8);
    if(q && matches.length) showDrop(pmDrop, matches, name=>{ pmInput.value=name; state.pm=name; hideDrop(pmDrop); });
    else hideDrop(pmDrop);
  };
  pmInput.onblur = ()=>setTimeout(()=>hideDrop(pmDrop),150);
  pmInput.onchange = ()=>{ state.pm = pmInput.value.trim(); };

  // Lead autocomplete
  const leadInput = modal.querySelector('#assignLead');
  const leadDrop = modal.querySelector('#leadDrop');
  leadInput.oninput = ()=>{
    const q = leadInput.value.trim().toLowerCase();
    const matches = allUsers.filter(u=>u.name.toLowerCase().includes(q)).slice(0,8);
    if(q && matches.length) showDrop(leadDrop, matches, name=>{ leadInput.value=name; state.lead=name; hideDrop(leadDrop); });
    else hideDrop(leadDrop);
  };
  leadInput.onblur = ()=>setTimeout(()=>hideDrop(leadDrop),150);
  leadInput.onchange = ()=>{ state.lead = leadInput.value.trim(); };

  // Consultant chip management
  function refreshChips(){
    modal.querySelector('#consultChips').innerHTML = state.consultants.map(name=>`
      <span class="assign-chip">${PDMS.esc(name)}
        <button type="button" class="assign-chip-x" data-name="${PDMS.esc(name)}">×</button>
      </span>`).join('');
    modal.querySelectorAll('.assign-chip-x').forEach(btn=>{
      btn.onclick = ()=>{ state.consultants = state.consultants.filter(n=>n!==btn.dataset.name); refreshChips(); };
    });
  }
  refreshChips();

  const consultInput = modal.querySelector('#assignConsult');
  const consultDrop = modal.querySelector('#consultDrop');
  consultInput.oninput = ()=>{
    const q = consultInput.value.trim().toLowerCase();
    if(!q){ hideDrop(consultDrop); return; }
    const matches = allUsers.filter(u=>u.name.toLowerCase().includes(q) && !state.consultants.includes(u.name)).slice(0,8);
    showDrop(consultDrop, matches, name=>{
      state.consultants.push(name);
      consultInput.value='';
      hideDrop(consultDrop);
      refreshChips();
    });
  };
  consultInput.onblur = ()=>setTimeout(()=>hideDrop(consultDrop),150);

  modal.querySelector('#saveAssignBtn').onclick = function(){
    state.pm = pmInput.value.trim() || state.pm;
    state.lead = leadInput.value.trim() || state.lead;
    PDMS.api.update('projects',p.id,{pm:state.pm, lead:state.lead, consultants:state.consultants}).then(saved=>{
      Object.assign(p,saved);
      modal.remove();
      PDMS.toast('Team updated','Assignment saved','success');
      const assignUser = PDMS.getUser();
      const parts = [];
      if(state.pm) parts.push('PM: '+state.pm);
      if(state.lead) parts.push('Lead: '+state.lead);
      if(state.consultants.length) parts.push(state.consultants.length+' consultant(s)');
      PDMS.notify('Team Assigned', `${assignUser.name} (${assignUser.role}) assigned team on "${p.name}" — ${parts.join(', ')}`, 'users', 'project-details.html#id='+p.id);
      render();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not update assignment','error'));
  };
}
function uploadDoc(){
  PDMS.modal('Upload Document',`<div class="form-row"><label>File</label><input type="file"/></div><div class="form-row"><label>Description</label><input placeholder="What is this?"/></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" onclick="this.closest('.modal-backdrop').remove();PDMS.toast('Uploaded','Document uploaded successfully','success')">Upload</button>`);
}
function changeStatus(){
  const options = PDMS.statusOptionsFor();
  const modal = PDMS.modal('Change Project Status',`<div class="form-row"><label>New Status</label><select id="ns">${options.map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveStatusBtn">Update</button>`);
  modal.querySelector('#saveStatusBtn').onclick = function(){
    const newStatus = modal.querySelector('#ns').value;
    if(!PDMS.canChangeStatus(p,newStatus)){
      PDMS.toast('Not allowed',"You don't have permission to set this status",'error');
      return;
    }
    PDMS.api.update('projects',p.id,{status:newStatus}).then(saved=>{
      Object.assign(p,saved);
      modal.remove();
      PDMS.toast('Status updated','Project status has been updated','success');
      const statusUser = PDMS.getUser();
      PDMS.notify('Status Changed', `${statusUser.name} (${statusUser.role}) changed "${p.name}" status to "${newStatus}"`, 'refresh', 'project-details.html#id='+p.id);
      render();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not update status','error'));
  };
}
function startDelivery(){
  const modal = PDMS.modal('Start Delivery',`
    <p class="text-sm text-muted" style="margin-bottom:16px">This moves ${PDMS.esc(p.name)} from the Sales pipeline into delivery, starting at "Not Started". You can assign a Project Manager and Lead now or later.</p>
    <style>
      .assign-ac-wrap{position:relative}.assign-ac-wrap input{width:100%;box-sizing:border-box}
      .assign-ac-drop{position:absolute;top:100%;left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;display:none}
      .assign-ac-drop.open{display:block}
      .assign-ac-item{padding:8px 12px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}
      .assign-ac-item:hover{background:var(--primary-10,rgba(99,102,241,.08))}
      .assign-ac-avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
    </style>
    <div class="form-grid">
      <div class="form-row"><label>Project Manager</label>
        <div class="assign-ac-wrap"><input id="startDelPm" autocomplete="off" placeholder="Search by name…"/><div class="assign-ac-drop" id="startPmDrop"></div></div>
      </div>
      <div class="form-row"><label>Project Lead</label>
        <div class="assign-ac-wrap"><input id="startDelLead" autocomplete="off" placeholder="Search by name…"/><div class="assign-ac-drop" id="startLeadDrop"></div></div>
      </div>
    </div>
  `,`<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="startDelBtn">Start Delivery</button>`);

  function acItem(u){ return `<div class="assign-ac-item" data-name="${PDMS.esc(u.name)}"><div class="assign-ac-avatar">${PDMS.initials(u.name)}</div><div><div style="font-weight:600">${PDMS.esc(u.name)}</div><div style="font-size:12px;color:var(--text-muted)">${PDMS.esc(u.role||'')}</div></div></div>`; }
  function wireAc(input, drop){
    input.oninput = ()=>{
      const q = input.value.trim().toLowerCase();
      const hits = D.users.filter(u=>u.name.toLowerCase().includes(q)).slice(0,8);
      if(q && hits.length){ drop.innerHTML = hits.map(acItem).join(''); drop.classList.add('open'); drop.querySelectorAll('.assign-ac-item[data-name]').forEach(el=>{ el.onmousedown=e=>{e.preventDefault();input.value=el.dataset.name;drop.classList.remove('open');}; }); }
      else drop.classList.remove('open');
    };
    input.onblur = ()=>setTimeout(()=>drop.classList.remove('open'),150);
  }
  wireAc(modal.querySelector('#startDelPm'), modal.querySelector('#startPmDrop'));
  wireAc(modal.querySelector('#startDelLead'), modal.querySelector('#startLeadDrop'));

  modal.querySelector('#startDelBtn').onclick = function(){
    const pm = modal.querySelector('#startDelPm').value.trim();
    const lead = modal.querySelector('#startDelLead').value.trim();
    const patch = { stage:'Delivery', status:'Not Started' };
    if(pm) patch.pm = pm;
    if(lead) patch.lead = lead;
    PDMS.api.update('projects',p.id,patch).then(saved=>{
      Object.assign(p,saved);
      modal.remove();
      PDMS.toast('Delivery started', `${p.name} is now being managed by delivery`,'success');
      const delUser = PDMS.getUser();
      PDMS.notify('Delivery Started', `${delUser.name} (${delUser.role}) moved "${p.name}" into delivery`, 'zap', 'project-details.html#id='+p.id);
      render();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not start delivery','error'));
  };
}
window.postProjectReview=postProjectReview;window.submitInlineIssue=submitInlineIssue;window.assignTeam=assignTeam;window.uploadDoc=uploadDoc;window.changeStatus=changeStatus;window.startDelivery=startDelivery;
</script></body></html>
