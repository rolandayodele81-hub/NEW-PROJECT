<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Project Details — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('projects');
const D = PDMS_DATA; const I = PDMS.icon;
let p, tasks, done;

function render(){
const hasProjects = Array.isArray(D.projects) && D.projects.length > 0;
const id = hasProjects ? new URLSearchParams(location.search).get('id') || D.projects[0].id : null;
p = hasProjects ? D.projects.find(x=>x.id===id) || D.projects[0] : null;

if(!p){
  document.getElementById('content').innerHTML = `
    <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Projects</span></div>
      <h1 class="page-title">No Project Data</h1><div class="page-sub">You currently do not have any project records.</div></div>
      <div class="flex gap-2"><a class="btn btn-primary" href="projects.html">Open Projects</a></div></div>
    <div class="card"><div class="card-body"><p class="text-muted">Add your own project data in <code>js/data.js</code> or use the template structure to populate this app.</p></div></div>
  `;
} else {
  tasks = D.tasksFor(p.id);
  done = tasks.filter(t=>t.status==='Completed').length;

  document.getElementById('content').innerHTML = `
  <div class="page-head">
    <div><div class="breadcrumbs"><span><a href="projects.html">Projects</a></span><span>${p.id}</span></div>
      <h1 class="page-title">${PDMS.esc(p.name)}</h1><div class="page-sub">${PDMS.esc(p.client)} • ${PDMS.esc(p.type)}</div></div>
    <div class="flex gap-2">
      ${PDMS.can('Add Remarks')?`<button class="btn btn-secondary" onclick="addRemark()">${I('message')} Add Remark</button>`:''}
      <button class="btn btn-secondary" onclick="uploadDel()">${I('upload')} Upload</button>
      ${(PDMS.can('Change Status')||(PDMS.can('Confirm Project')&&p.status==='Incoming'))?`<button class="btn btn-primary" onclick="changeStatus()">${I('refresh')} Change Status</button>`:''}
    </div>
  </div>

  <div class="proj-head">
    <div class="flex gap-4 items-center" style="flex-wrap:wrap">
      <div class="ring" style="--p:${p.progress};--sz:100px;--th:10px"><span class="ring-val">${p.progress}%</span></div>
      <div style="flex:1;min-width:200px">
        <div class="flex gap-2 mb-2"><span class="badge badge-${D.statusColors[p.status]}">${p.status}</span><span class="badge ${D.prioColors[p.priority]}">${p.priority}</span><span class="badge badge-muted">${p.id}</span></div>
        <p class="text-muted">${PDMS.esc(p.description)}</p>
      </div>
      <div class="grid grid-2" style="gap:12px 24px">
        <div><div class="text-sm text-muted">Budget</div><div class="font-bold">${PDMS.money(p.budget)}</div></div>
        <div><div class="text-sm text-muted">Start</div><div class="font-semi">${p.start}</div></div>
        <div><div class="text-sm text-muted">Due</div><div class="font-semi">${p.due}</div></div>
        <div><div class="text-sm text-muted">Files</div><div class="font-semi">${p.files}</div></div>
      </div>
    </div>
  </div>

  <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px">
    <div class="flex flex-col gap-4">
      <div class="card"><div class="card-head"><div class="card-title">Tasks (${done}/${tasks.length})</div>${PDMS.can('Assign Project')?`<button class="btn btn-primary btn-sm" onclick="newTask()">${I('plus')} New Task</button>`:''}</div>
        <div class="card-body" style="padding:8px 0">${tasks.map(t=>`
          <div style="padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center">
            <div style="width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:${t.status==='Completed'?'var(--success)':'var(--surface-2)'};color:${t.status==='Completed'?'#fff':'var(--text-muted)'}">${I('check')}</div>
            <div style="flex:1"><div class="font-semi">${PDMS.esc(t.title)}</div><div class="text-sm text-muted">Assigned to ${PDMS.esc(t.assignee)} • Due ${t.due}</div></div>
            <div style="width:120px" class="progress-inline"><div class="progress"><div class="bar" style="width:${t.progress}%"></div></div><span class="pct">${t.progress}%</span></div>
            <span class="badge badge-${t.status==='Completed'?'success':t.status==='In Progress'?'warn':'muted'}">${t.status}</span>
          </div>`).join('')}</div>
      </div>
      <div class="card"><div class="card-head"><div class="card-title">Milestones & Timeline</div></div>
        <div class="card-body"><div class="timeline">
          <div class="tl-item done"><div class="tl-title">Kickoff & Requirements</div><div class="tl-meta">${p.start} • Completed</div></div>
          <div class="tl-item done"><div class="tl-title">Solution Architecture</div><div class="tl-meta">Completed by ${PDMS.esc(p.lead)}</div></div>
          <div class="tl-item active"><div class="tl-title">Implementation Phase</div><div class="tl-meta">Ongoing — ${p.progress}% complete</div></div>
          <div class="tl-item"><div class="tl-title">UAT & Client Review</div><div class="tl-meta">Scheduled</div></div>
          <div class="tl-item"><div class="tl-title">Go-Live & Handover</div><div class="tl-meta">Target ${p.due}</div></div>
        </div></div>
      </div>
      <div class="card"><div class="card-head"><div class="card-title">Deliverables & Files</div><button class="btn btn-secondary btn-sm">${I('upload')} Upload</button></div>
        <div class="card-body" style="padding:8px 20px">
          ${['Statement_of_Work.pdf','Architecture_Diagram.pdf','Sprint3_Report.docx','UAT_Feedback.xlsx','Client_Signoff.pdf'].map((f,i)=>`
            <div class="activity"><div class="a-icon">${I('file')}</div>
              <div style="flex:1"><div class="font-semi text-sm">${f}</div><div class="a-time">${['2 days ago','5 days ago','1 week ago','2 weeks ago','1 month ago'][i]}</div></div>
              <button class="icon-btn">${I('download')}</button></div>`).join('')}
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-4">
      <div class="card"><div class="card-head"><div class="card-title">Team</div></div>
        <div class="card-body">
          <div class="mb-3"><div class="text-sm text-muted">Project Manager</div><div class="flex items-center gap-2 mt-2"><div class="avatar avatar-sm">${PDMS.initials(p.pm)}</div><div class="font-semi">${PDMS.esc(p.pm)}</div></div></div>
          <div class="mb-3"><div class="text-sm text-muted">Project Lead</div><div class="flex items-center gap-2 mt-2"><div class="avatar avatar-sm">${PDMS.initials(p.lead)}</div><div class="font-semi">${PDMS.esc(p.lead)}</div></div></div>
          <div class="mb-3"><div class="text-sm text-muted">Sales Representative</div><div class="flex items-center gap-2 mt-2"><div class="avatar avatar-sm">${PDMS.initials(p.sales)}</div><div class="font-semi">${PDMS.esc(p.sales)}</div></div></div>
          <div><div class="text-sm text-muted mb-2">Consultants (${p.consultants.length})</div>${p.consultants.map(c=>`<div class="flex items-center gap-2 mb-2"><div class="avatar avatar-sm">${PDMS.initials(c)}</div><div class="text-sm">${PDMS.esc(c)}</div></div>`).join('')}</div>
          ${PDMS.can('Assign Consultant')?`<button class="btn btn-secondary w-full mt-2" style="justify-content:center" onclick="PDMS.toast('Assignment','Consultant assignment opened','success')">${I('user-plus')} Assign Consultant</button>`:''}
        </div>
      </div>
      <div class="card"><div class="card-head"><div class="card-title">Remarks & Notes</div></div>
        <div class="card-body">
          ${[{u:p.pm,m:'Requirements sign-off received from client.',t:'2h ago'},{u:p.lead,m:'Architecture review passed. Proceeding to implementation.',t:'1d ago'},{u:p.sales,m:'Client confirmed additional scope for phase 2.',t:'3d ago'}].map(r=>`
            <div style="padding:10px 0;border-bottom:1px solid var(--border)"><div class="flex items-center gap-2"><div class="avatar avatar-sm">${PDMS.initials(r.u)}</div><div class="font-semi text-sm">${PDMS.esc(r.u)}</div><div class="text-sm text-muted" style="margin-left:auto">${r.t}</div></div><div class="text-sm mt-2">${PDMS.esc(r.m)}</div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>
`;
}
}
PDMS.onRefresh(render);

function addRemark(){
  PDMS.modal('Add Remark',`<div class="form-row"><label>Your remark</label><textarea rows="4" placeholder="Type your remark..."></textarea></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" onclick="this.closest('.modal-backdrop').remove();PDMS.toast('Remark added','Your remark has been posted','success')">Post</button>`);
}
function uploadDel(){
  PDMS.modal('Upload Deliverable',`<div class="form-row"><label>File</label><input type="file"/></div><div class="form-row"><label>Description</label><input placeholder="What is this?"/></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" onclick="this.closest('.modal-backdrop').remove();PDMS.toast('Uploaded','Deliverable uploaded successfully','success')">Upload</button>`);
}
function changeStatus(){
  const options = PDMS.can('Change Status') ? D.statuses : D.statuses.filter(s=>s===p.status||PDMS.canChangeStatus(p.status,s));
  const modal = PDMS.modal('Change Project Status',`<div class="form-row"><label>New Status</label><select id="ns">${options.map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveStatusBtn">Update</button>`);
  modal.querySelector('#saveStatusBtn').onclick = function(){
    const newStatus = modal.querySelector('#ns').value;
    if(!PDMS.canChangeStatus(p.status,newStatus)){
      PDMS.toast('Not allowed',"You don't have permission to set this status",'error');
      return;
    }
    PDMS.api.update('projects',p.id,{status:newStatus}).then(saved=>{
      Object.assign(p,saved);
      modal.remove();
      PDMS.toast('Status updated','Project status has been updated','success');
      render();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not update status','error'));
  };
}
function newTask(){
  PDMS.modal('Create Task',`<div class="form-row"><label>Task title</label><input/></div><div class="form-grid"><div class="form-row"><label>Assignee</label><select>${D.users.slice(0,10).map(u=>`<option>${u.name}</option>`).join('')}</select></div><div class="form-row"><label>Due date</label><input type="date"/></div></div>`,
    `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" onclick="this.closest('.modal-backdrop').remove();PDMS.toast('Task created','New task added to project','success')">Create</button>`);
}
window.addRemark=addRemark;window.uploadDel=uploadDel;window.changeStatus=changeStatus;window.newTask=newTask;
</script></body></html>
