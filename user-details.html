<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>User Details — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
// A hash survives any host's clean-URL rewriting untouched, since it's never
// sent to the server — unlike ?id=, which some static hosts strip on redirect.
window.addEventListener('hashchange', ()=>location.reload());
PDMS.mountShell('users');
const D = PDMS_DATA; const I = PDMS.icon;
let u;

function projectsFor(user){
  return D.projects.filter(p => p.pm===user.name || p.lead===user.name || (p.consultants||[]).includes(user.name));
}

function render(){
  const hasUsers = Array.isArray(D.users) && D.users.length > 0;
  const id = hasUsers ? new URLSearchParams(location.hash.replace(/^#/,'')).get('id') || D.users[0].id : null;
  u = hasUsers ? D.users.find(x=>x.id===id) || D.users[0] : null;

  if(!u){
    document.getElementById('content').innerHTML = window.PDMS_REMOTE ? `
      <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Users</span></div>
        <h1 class="page-title">No User Data</h1><div class="page-sub">You currently do not have any user records.</div></div>
        <div class="flex gap-2"><a class="btn btn-primary" href="users.html">Open Users</a></div></div>
    ` : `
      <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Users</span></div>
        <h1 class="page-title">Loading User...</h1><div class="page-sub">Fetching user data</div></div></div>
      <div class="card"><div class="card-body pdms-loading-inline"><span class="pdms-spinner"></span>Loading...</div></div>
    `;
    return;
  }

  const userProjects = projectsFor(u);
  const currentProjects = userProjects.filter(p => p.status !== 'Completed' && p.status !== 'Rejected');
  const previousProjects = userProjects.filter(p => p.status === 'Completed' || p.status === 'Rejected');

  const statusColor = u.status==='Active'?'#22c55e':u.status==='On Leave'?'#f59e0b':'#ef4444';

  document.getElementById('content').innerHTML = `

  <!-- ── Profile Hero ── -->
  <div style="border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(29,60,136,.18);margin-bottom:20px">

    <!-- Gradient hero (no separate cover — all content inside) -->
    <div style="background:linear-gradient(135deg,#090d16 0%,#1d3c88 45%,#8b5cf6 80%,#ec4899 100%);padding:22px 28px 20px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <!-- Avatar -->
        <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0">${PDMS.initials(u.name)}</div>
        <!-- Name + role -->
        <div style="flex:1;min-width:160px">
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px">
            <span style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;letter-spacing:.4px">${PDMS.esc(u.role)}</span>
            <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,0.2);color:#86efac;border:1px solid rgba(34,197,94,0.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600">
              <span style="width:5px;height:5px;border-radius:50%;background:#86efac"></span>${PDMS.esc(u.status||'Active')}
            </span>
          </div>
          <div style="font-size:20px;font-weight:800;color:#fff;line-height:1.2">${PDMS.esc(u.name)}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px">${PDMS.esc(u.dept||'')}${u.dept&&u.email?' · ':''}${PDMS.esc(u.email||'')}</div>
        </div>
        <!-- Stat chips -->
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px 16px;text-align:center;min-width:80px">
            <div style="font-size:20px;font-weight:800;color:#fff;line-height:1">${currentProjects.length}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:600;margin-top:2px;letter-spacing:.4px;text-transform:uppercase">Current</div>
          </div>
          <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px 16px;text-align:center;min-width:80px">
            <div style="font-size:20px;font-weight:800;color:#fff;line-height:1">${userProjects.length}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:600;margin-top:2px;letter-spacing:.4px;text-transform:uppercase">Total</div>
          </div>
        </div>
      </div>
    </div>

      <!-- Detail fields -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden">
        ${[
          {label:'Email',         value: u.email||'—'},
          {label:'Phone',         value: u.phone||'—'},
          {label:'Date of Entry', value: u.dateOfEntry||u.joined||'—'},
          {label:'Date of Birth', value: u.birthday||'—'},
        ].map((f,i,arr)=>`
          <div style="padding:14px 18px;background:var(--surface-2);${i%2===0&&i<arr.length-1?'border-right:1px solid var(--border)':''};${i<2?'border-bottom:1px solid var(--border)':''}">
            <div style="font-size:10px;font-weight:700;letter-spacing:.7px;color:var(--text-soft);text-transform:uppercase;margin-bottom:4px">${f.label}</div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${PDMS.esc(f.value)}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- ── Projects Section ── -->
  <div style="display:flex;flex-direction:column;gap:16px">

    <!-- Current Projects -->
    <div class="card">
      <div class="card-head">
        <div><div class="card-title">Current Projects</div><div class="card-sub">Ongoing engagements</div></div>
        <span style="background:rgba(99,102,241,.12);color:var(--primary);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700">${currentProjects.length}</span>
      </div>
      <div style="padding:0">
        <div style="overflow-x:auto">
          <table class="data">
            <thead><tr><th>Project</th><th>Client</th><th>Role</th><th>Status</th></tr></thead>
            <tbody>
              ${currentProjects.map(p=>`
                <tr style="cursor:pointer" onclick="location.href='project-details.html#id=${p.id}'">
                  <td><div style="font-weight:600;color:var(--primary)">${PDMS.esc(p.name)}</div><div style="font-size:11px;color:var(--text-soft)">${PDMS.esc(p.id)}</div></td>
                  <td>${PDMS.esc(p.client||'—')}</td>
                  <td><span style="font-size:12px;font-weight:600;color:var(--text-soft)">${p.pm===u.name?'Project Manager':p.lead===u.name?'Project Lead':'Consultant'}</span></td>
                  <td><span class="badge badge-${D.statusColors[p.status]||'muted'}">${PDMS.esc(p.status)}</span></td>
                </tr>`).join('')||`<tr><td colspan="4" style="text-align:center;padding:28px;color:var(--text-muted);font-size:13px">${PDMS.emptyOrLoading('No current projects')}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Project History -->
    <div class="card">
      <div class="card-head">
        <div><div class="card-title">Project History</div><div class="card-sub">Completed & closed engagements</div></div>
        <span style="background:var(--surface-2);color:var(--text-soft);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;border:1px solid var(--border)">${previousProjects.length}</span>
      </div>
      <div style="padding:0">
        <div style="overflow-x:auto">
          <table class="data">
            <thead><tr><th>Project</th><th>Client</th><th>Role</th><th>Status</th></tr></thead>
            <tbody>
              ${previousProjects.map(p=>`
                <tr style="cursor:pointer" onclick="location.href='project-details.html#id=${p.id}'">
                  <td><div style="font-weight:600;color:var(--text)">${PDMS.esc(p.name)}</div><div style="font-size:11px;color:var(--text-soft)">${PDMS.esc(p.id)}</div></td>
                  <td>${PDMS.esc(p.client||'—')}</td>
                  <td><span style="font-size:12px;font-weight:600;color:var(--text-soft)">${p.pm===u.name?'Project Manager':p.lead===u.name?'Project Lead':'Consultant'}</span></td>
                  <td><span class="badge badge-${D.statusColors[p.status]||'muted'}">${PDMS.esc(p.status)}</span></td>
                </tr>`).join('')||`<tr><td colspan="4" style="text-align:center;padding:28px;color:var(--text-muted);font-size:13px">${PDMS.emptyOrLoading('No project history')}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
  `;
}
PDMS.onRefresh(render);
</script>
</body></html>
