<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Notifications — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('notifications');
const D=PDMS_DATA;const I=PDMS.icon;
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Notifications</span></div>
    <h1 class="page-title">Notifications</h1><div class="page-sub">${D.notifications.filter(n=>n.unread).length} unread</div></div>
    <button class="btn btn-secondary">Mark all as read</button></div>
  <div class="card"><div class="card-body" style="padding:6px">
    ${D.notifications.map(n=>`<div class="notif ${n.unread?'unread':''}"><div class="n-icon">${I(n.icon)}</div>
      <div style="flex:1"><div class="n-title">${PDMS.esc(n.title)}</div><div class="n-msg">${PDMS.esc(n.msg)}</div><div class="n-time">${n.time}</div></div></div>`).join('')}
  </div></div>`;
</script></body></html>
