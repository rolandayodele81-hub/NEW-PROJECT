<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Delivery Dashboard — PSE PDMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .htd-hero {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 20px;
      padding: 24px 26px;
      border-radius: 28px;
      background: linear-gradient(135deg, #090d16 0%, #1d3c88 40%, #8b5cf6 75%, #ec4899 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(29, 60, 136, .25);
      margin-bottom: 24px;
    }

    .htd-hero::before {
      content: "";
      position: absolute;
      inset: -20% -10% auto auto;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(255, 255, 255, .2), rgba(255, 255, 255, 0) 70%);
      filter: blur(10px);
      animation: drift 8s ease-in-out infinite alternate;
    }

    .htd-hero-copy {
      position: relative;
      z-index: 1
    }

    .htd-hero-card {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .18);
    }

    .staffing-select {
      font-size: 12px;
      padding: 4px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
    }

    /* Typeahead for staffing table */
    .ht-ac-wrap {
      position: relative
    }

    .ht-ac-wrap input {
      font-size: 12px;
      padding: 4px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box
    }

    .ht-ac-drop {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 9999;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
      max-height: 160px;
      overflow-y: auto;
      display: none
    }

    .ht-ac-drop.open {
      display: block
    }

    .ht-ac-item {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .ht-ac-item:hover {
      background: var(--surface-2)
    }

    .ht-ac-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0)
      }

      to {
        transform: translate3d(-20px, -10px, 0)
      }
    }

    @media(max-width:900px) {
      .htd-hero {
        grid-template-columns: 1fr
      }

      .htd-hero-card {
        margin-top: 8px
      }
    }
  </style>
</head>

<body>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/app.js"></script>
  <script>
    PDMS.mountShell('dashboard');
    const D = PDMS_DATA; const I = PDMS.icon;

    function render() {
      const salesProjects = D.projects.filter(p => PDMS.stageOf(p) === 'Sales');
      const deliveryProjects = D.projects.filter(p => PDMS.stageOf(p) === 'Delivery');
      const activeDelivery = deliveryProjects.filter(p => p.status === 'In Progress').length;
      const criticalCount = deliveryProjects.filter(p => p.priority === 'Critical').length;
      const consultants = D.users.filter(u => u.role === 'Consultant');
      const allocated = consultants.filter(c => c.availability !== 'Available').length;
      const utilization = Math.round((allocated / Math.max(consultants.length, 1)) * 100);

      document.getElementById('content').innerHTML = `
  <div class="htd-hero">
    <div class="htd-hero-copy">
      <h1 class="page-title" style="font-size:30px;line-height:1.1;margin-top:10px">Delivery & Operations Dashboard</h1>
      <p class="page-sub" style="font-size:14px;max-width:640px;color:rgba(255,255,255,.9);margin-top:8px">Onboard delivery leaders, assign PMs and Leads, manage consultant allocations, and oversee technical governance.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" onclick="newUser()">${I('user-plus')} Onboard Staff</button>
        <a class="btn btn-secondary" href="consultants.html" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.18)">${I('briefcase')} View Resources</a>
      </div>
    </div>
    <div class="htd-hero-card">
      <div class="ring" style="--p:${utilization};--sz:92px;--th:8px;--c:#8b5cf6"><span class="ring-val">${utilization}%</span></div>
      <div>
        <div class="hero-card-title">Bench Utilization</div>
        <div class="hero-card-text">${allocated} of ${consultants.length} consultants are actively staffed.</div>
        <div class="hero-card-foot">Dynamic Allocation</div>
      </div>
    </div>
  </div>

  <div class="grid grid-4 mb-4">
    <div class="stat i-primary">
      <div class="label">Active Delivery</div>
      <div class="value">${activeDelivery}</div>
      <div class="delta up">Projects in progress</div>
      <div class="icon-wrap">${I('folder')}</div>
    </div>
    <div class="stat i-warn">
      <div class="label">Critical Escalations</div>
      <div class="value">${criticalCount}</div>
      <div class="delta down">Requires attention</div>
      <div class="icon-wrap">${I('zap')}</div>
    </div>
    <div class="stat i-success">
      <div class="label">Sales Pipeline</div>
      <div class="value">${salesProjects.length}</div>
      <div class="delta up">Prospects in pipeline</div>
      <div class="icon-wrap">${I('trending')}</div>
    </div>
    <div class="stat i-info">
      <div class="label">Total Bench Size</div>
      <div class="value">${consultants.length}</div>
      <div class="delta up">Engineers & Analysts</div>
      <div class="icon-wrap">${I('users')}</div>
    </div>
  </div>

  <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px">
    <div class="card">
      <div class="card-head">
        <div><div class="card-title">Delivery Status Breakdown</div><div class="card-sub">How many projects sit in each delivery status</div></div>
        <span class="badge badge-primary">${deliveryProjects.length} total</span>
      </div>
      <div class="card-body" style="padding:12px 20px">
        ${(()=>{
          const max = Math.max(...D.deliveryStatuses.map(s=>deliveryProjects.filter(p=>p.status===s).length), 1);
          const sc = {'Not Started':'#94a3b8','In Progress':'#f59e0b','On Hold':'#64748b','Awaiting Review':'#eab308','Testing / Quality Assurance':'#8b5cf6','Completed':'#10b981','Approved':'#4f46e5','Rejected':'#ef4444'};
          return D.deliveryStatuses.map(s=>{
            const count = deliveryProjects.filter(p=>p.status===s).length;
            const pct = Math.round((count/max)*100);
            const color = sc[s]||'#94a3b8';
            return `
            <div style="display:grid;grid-template-columns:160px 1fr 36px;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
              <div class="text-sm" style="display:flex;align-items:center;gap:6px;min-width:0">
                <span style="width:8px;height:8px;border-radius:2px;background:${color};flex-shrink:0;display:inline-block"></span>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s}</span>
              </div>
              <div style="background:var(--surface-2);border-radius:6px;height:14px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:${color};border-radius:6px;transition:width .4s ease;opacity:${count===0?'0.25':'1'}"></div>
              </div>
              <div class="text-sm font-semi" style="text-align:right;color:${count===0?'var(--text-muted)':'var(--text)'}">${count}</div>
            </div>`;
          }).join('');
        })()}
        ${deliveryProjects.length===0 ? `<div class="text-muted text-sm text-center" style="padding:16px 0">${PDMS.emptyOrLoading('No delivery projects yet')}</div>` : ''}
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div><div class="card-title">Critical Attention</div><div class="card-sub">Critical priority delivery projects</div></div>
        <span class="badge badge-warn">Risk Feed</span>
      </div>
      <div class="card-body" style="padding:8px 20px">
        ${deliveryProjects.filter(p => p.priority === 'Critical').slice(0, 5).map(p => `
          <div class="activity" style="align-items:center;padding:12px 0">
            <div class="a-icon" style="background:rgba(239,68,68,.12);color:var(--danger)">${I('zap')}</div>
            <div style="flex:1">
              <div class="font-semi text-sm"><a href="project-details.html#id=${p.id}" style="color:var(--primary)">${PDMS.esc(p.name)}</a></div>
              <div class="text-sm text-muted">${PDMS.esc(p.client)} · ${p.progress || 0}% done</div>
            </div>
            <span class="badge badge-danger">${p.priority}</span>
          </div>`).join('')}
        ${deliveryProjects.filter(p => p.priority === 'Critical').length === 0 ? `<div class="text-muted text-center" style="padding:32px 0">${PDMS.emptyOrLoading('No critical escalations')}</div>` : ''}
      </div>
    </div>
  </div>

  <!-- Projects in Delivery -->
  <div class="flex items-center justify-between mb-3">
    <h2 class="card-title" style="font-size:18px">Projects in Delivery</h2>
    <a class="btn btn-secondary btn-sm" href="projects.html#view=delivery">View More</a>
  </div>
  <div class="card mb-4">
    <div class="card-body" style="padding:0">
      <div style="overflow-x:auto">
        <table class="data">
          <thead><tr><th>Project</th><th>Client</th><th>Status</th><th>PM</th><th>Lead</th><th>Progress</th><th>Action</th></tr></thead>
          <tbody>
            ${deliveryProjects.slice(0, 8).map(p => `
              <tr>
                <td><a href="project-details.html#id=${p.id}" class="font-semi" style="color:var(--primary)">${PDMS.esc(p.name)}</a></td>
                <td class="text-muted">${PDMS.esc(p.client || '—')}</td>
                <td><span class="badge badge-${D.statusColors[p.status] || 'muted'}">${PDMS.esc(p.status)}</span></td>
                <td id="pm-cell-${p.id}">
                  <div class="ht-ac-wrap">
                    <input autocomplete="off" value="${PDMS.esc(p.pm || '')}" placeholder="Assign PM…"
                      oninput="acField(this,'${p.id}','pm')"
                      onblur="saveField(this,'${p.id}','pm',150)"
                      onchange="saveField(this,'${p.id}','pm',0)"/>
                    <div class="ht-ac-drop" id="drop-pm-${p.id}"></div>
                  </div>
                </td>
                <td>
                  <div class="ht-ac-wrap">
                    <input autocomplete="off" value="${PDMS.esc(p.lead || '')}" placeholder="Assign Lead…"
                      oninput="acField(this,'${p.id}','lead')"
                      onblur="saveField(this,'${p.id}','lead',150)"
                      onchange="saveField(this,'${p.id}','lead',0)"/>
                    <div class="ht-ac-drop" id="drop-lead-${p.id}"></div>
                  </div>
                </td>
                <td>
                  <div class="progress-inline" style="min-width:80px">
                    <div class="progress"><div class="bar" style="width:${p.progress || 0}%"></div></div>
                    <span class="pct">${p.progress || 0}%</span>
                  </div>
                </td>
                <td><button class="btn btn-secondary btn-sm" onclick="manageConsultants('${p.id}')">Staff</button></td>
              </tr>`).join('') || `<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px">${PDMS.emptyOrLoading('No delivery projects yet')}</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Sales Pipeline (view only) -->
  <div class="card mb-4">
    <div class="card-head">
      <div>
        <div class="card-title">Sales Pipeline</div>
        <div class="card-sub">Approved prospects ready to transition into delivery</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="badge badge-muted">${salesProjects.length} in pipeline</span>
        <a class="btn btn-secondary btn-sm" href="projects.html#view=sales">View More</a>
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div style="overflow-x:auto">
        <table class="data">
          <thead><tr><th>Project</th><th>Client</th><th>Priority</th><th>Status</th></tr></thead>
          <tbody>
            ${salesProjects.slice(0, 6).map(p => `
              <tr>
                <td><a href="project-details.html#id=${p.id}" class="font-semi" style="color:var(--primary)">${PDMS.esc(p.name)}</a></td>
                <td>${PDMS.esc(p.client || '—')}</td>
                <td><span class="badge ${D.prioColors[p.priority] || ''}">${PDMS.esc(p.priority)}</span></td>
                <td><span class="badge badge-${D.statusColors[p.status] || 'muted'}">${PDMS.esc(p.status)}</span></td>
              </tr>`).join('') || `<tr><td colspan="4" class="text-muted" style="text-align:center;padding:24px">${PDMS.emptyOrLoading('No sales pipeline projects')}</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  `;

      wireAcDrops();
    }

    // Wire autocomplete for inline PM/Lead fields after render
    function wireAcDrops() {
      document.querySelectorAll('.ht-ac-wrap input').forEach(input => {
        const drop = input.nextElementSibling;
        if (!drop) return;
        input.addEventListener('input', function () {
          const q = this.value.trim().toLowerCase();
          if (!q) { drop.classList.remove('open'); return; }
          const hits = D.users.filter(u => u.name.toLowerCase().includes(q)).slice(0, 6);
          drop.innerHTML = hits.map(u => `<div class="ht-ac-item" data-name="${PDMS.esc(u.name)}"><div class="ht-ac-avatar">${PDMS.initials(u.name)}</div><span>${PDMS.esc(u.name)}</span><span style="font-size:11px;color:var(--text-muted)">${PDMS.esc(u.role)}</span></div>`).join('') || `<div class="ht-ac-item" style="color:var(--text-muted)">No matches</div>`;
          drop.classList.add('open');
          drop.querySelectorAll('.ht-ac-item[data-name]').forEach(el => {
            el.addEventListener('mousedown', e => { e.preventDefault(); input.value = el.dataset.name; drop.classList.remove('open'); input.dispatchEvent(new Event('change')); });
          });
        });
        input.addEventListener('blur', () => setTimeout(() => drop.classList.remove('open'), 150));
      });
    }

    // Save PM/Lead field after selection or blur
    const _saveTimers = {};
    function saveField(input, projectId, field, delay) {
      clearTimeout(_saveTimers[projectId + field]);
      _saveTimers[projectId + field] = setTimeout(() => {
        const project = D.projects.find(p => p.id === projectId);
        if (!project) return;
        const val = input.value.trim();
        if (val === (project[field] || '')) return; // no change
        const patch = {}; patch[field] = val;
        PDMS.api.update('projects', projectId, patch).then(saved => {
          Object.assign(project, saved);
          PDMS.notify('Team Updated', `${PDMS.getUser().name} set ${field === 'pm' ? 'PM' : 'Lead'} of "${project.name}" to ${val || '(none)'}`, 'users', 'project-details.html#id=' + projectId);
          PDMS.toast('Saved', `${field.toUpperCase()} updated`, 'success');
        }).catch(err => PDMS.toast('Error', err.message || 'Could not save', 'error'));
      }, delay);
    }

    // acField is only needed to trigger input event for the typeahead — handled by wireAcDrops
    function acField() { }

    function manageConsultants(projectId) {
      const project = D.projects.find(p => p.id === projectId);
      if (!project) return;
      const current = project.consultants || [];
      const consultantUsers = D.users.filter(u => u.role === 'Consultant');

      const modal = PDMS.modal(`Staff Consultants — ${PDMS.esc(project.name)}`, `
    <style>
      .assign-ac-wrap{position:relative}.assign-ac-wrap input{width:100%;box-sizing:border-box}
      .assign-ac-drop{position:absolute;top:100%;left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;display:none}
      .assign-ac-drop.open{display:block}
      .assign-ac-item{padding:8px 12px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}
      .assign-ac-item:hover{background:var(--surface-2)}
      .assign-ac-avatar{width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
      .assign-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:10px}
      .assign-chip{display:inline-flex;align-items:center;gap:4px;background:var(--primary-10,rgba(99,102,241,.1));color:var(--primary);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:500}
      .assign-chip-x{background:none;border:none;cursor:pointer;color:var(--primary);font-size:16px;line-height:1;padding:0 0 0 2px}
    </style>
    <div class="form-row">
      <label>Assigned Consultants</label>
      <div class="assign-chips" id="mcChips"></div>
      <div class="assign-ac-wrap">
        <input id="mcSearch" autocomplete="off" placeholder="Search and add consultants…"/>
        <div class="assign-ac-drop" id="mcDrop"></div>
      </div>
    </div>
  `, `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveConsultBtn">${I('check')} Save</button>`);

      const selected = [...current];

      function refreshChips() {
        modal.querySelector('#mcChips').innerHTML = selected.map(name => `
      <span class="assign-chip">${PDMS.esc(name)}<button type="button" class="assign-chip-x" data-name="${PDMS.esc(name)}">×</button></span>`).join('');
        modal.querySelectorAll('.assign-chip-x').forEach(btn => {
          btn.onclick = () => { selected.splice(selected.indexOf(btn.dataset.name), 1); refreshChips(); };
        });
      }
      refreshChips();

      const mcSearch = modal.querySelector('#mcSearch');
      const mcDrop = modal.querySelector('#mcDrop');
      mcSearch.oninput = () => {
        const q = mcSearch.value.trim().toLowerCase();
        if (!q) { mcDrop.classList.remove('open'); return; }
        const hits = consultantUsers.filter(u => u.name.toLowerCase().includes(q) && !selected.includes(u.name)).slice(0, 8);
        mcDrop.innerHTML = hits.map(u => `<div class="assign-ac-item" data-name="${PDMS.esc(u.name)}"><div class="assign-ac-avatar">${PDMS.initials(u.name)}</div><div><div style="font-weight:600">${PDMS.esc(u.name)}</div><div style="font-size:12px;color:var(--text-muted)">${PDMS.esc(u.dept || '')}</div></div></div>`).join('') || `<div class="assign-ac-item" style="color:var(--text-muted)">No matches</div>`;
        mcDrop.classList.add('open');
        mcDrop.querySelectorAll('.assign-ac-item[data-name]').forEach(el => {
          el.addEventListener('mousedown', e => { e.preventDefault(); selected.push(el.dataset.name); mcSearch.value = ''; mcDrop.classList.remove('open'); refreshChips(); });
        });
      };
      mcSearch.onblur = () => setTimeout(() => mcDrop.classList.remove('open'), 150);

      modal.querySelector('#saveConsultBtn').onclick = function () {
        PDMS.api.update('projects', projectId, { consultants: selected }).then(saved => {
          Object.assign(project, saved);
          modal.remove();
          PDMS.notify('Consultants Assigned', `${PDMS.getUser().name} staffed ${selected.length} consultant(s) on "${project.name}"`, 'users', 'project-details.html#id=' + projectId);
          PDMS.toast('Staff updated', `Consultants saved for ${projectId}`, 'success');
          render();
        }).catch(err => PDMS.toast('Error', err.message || 'Could not save', 'error'));
      };
    }

    function newUser() {
      const modal = PDMS.modal('Onboard New Delivery Resource', `
    <div class="form-grid">
      <div class="form-row"><label>Full Name</label><input id="newUserName" placeholder="Jane Smith"/></div>
      <div class="form-row"><label>Email</label><input id="newUserEmail" type="email" placeholder="jane.smith@pse.com"/></div>
      <div class="form-row"><label>Password</label><input id="newUserPassword" type="password" placeholder="Create initial password"/></div>
      <div class="form-row"><label>Role</label><select id="newUserRole">${D.roles.filter(r => r !== 'System Administrator').map(r => `<option value="${r}">${r}</option>`).join('')}</select></div>
      <div class="form-row"><label>Skill Set</label><input id="newUserDept" type="text" placeholder="e.g. Cyber Security"/></div>
      <div class="form-row"><label>Phone</label><input id="newUserPhone" type="text" placeholder="+1 555 123 4567"/></div>
    </div>
  `, `<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="createUserBtn">${I('check')} Onboard</button>`);

      modal.querySelector('#createUserBtn').onclick = function () {
        const name = modal.querySelector('#newUserName').value.trim();
        const email = modal.querySelector('#newUserEmail').value.trim().toLowerCase();
        const password = modal.querySelector('#newUserPassword').value;
        const role = modal.querySelector('#newUserRole').value;
        const dept = modal.querySelector('#newUserDept').value.trim();
        const phone = modal.querySelector('#newUserPhone').value.trim();
        if (!name || !email || !password) { PDMS.toast('Missing info', 'Name, email and password are required', 'error'); return; }
        if (D.users.some(u => u.email.toLowerCase() === email)) { PDMS.toast('Email in use', 'A user with this email already exists', 'error'); return; }
        const record = { name, email, password, role, dept, phone, workload: 0, joined: new Date().toISOString().slice(0, 10), status: 'Active' };
        PDMS.api.register(record).then(saved => {
          D.users.unshift(saved);
          modal.remove();
          const creator = PDMS.getUser();
          PDMS.notify('User Onboarded', `${creator ? creator.name : 'HTD'} onboarded ${saved.name} as ${saved.role}`, 'user-plus', 'user-details.html#id=' + saved.id);
          showNewUserPasswordNote(saved, password);
          render();
        }).catch(err => PDMS.toast('Error', err.message || 'Could not onboard user', 'error'));
      };
    }

    function showNewUserPasswordNote(user, password) {
      const modal = PDMS.modal('User Onboarded Successfully', `
    <p class="text-sm text-muted" style="margin-bottom:16px">The account for ${PDMS.esc(user.name)} is active. Share this password securely and ask them to change it on first login.</p>
    <div style="text-align:center;padding:18px;background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;font-size:20px;font-weight:800;letter-spacing:1px;color:var(--primary)">${PDMS.esc(password)}</div>
  `, `<button class="btn btn-primary w-full" data-close>Got it</button>`);
      modal.querySelector('.modal').classList.add('modal-sm');
    }

    window.newUser = newUser;
    window.manageConsultants = manageConsultants;
    window.acField = acField;
    window.saveField = saveField;

    PDMS.onRefresh(render);
  </script>
</body>

</html>
