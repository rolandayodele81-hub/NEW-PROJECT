<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Clients — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('clients');
const D=PDMS_DATA;const I=PDMS.icon;
function render(){
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Clients</span></div>
    <h1 class="page-title">Clients</h1><div class="page-sub">Enterprise partners and account overview</div></div>
    <button class="btn btn-primary" onclick="openClientModal()">${I('plus')} New Client</button></div>
  <div class="grid grid-3">${D.clients.map(c=>`
    <div class="card"><div class="card-body">
      <div class="flex items-center gap-3 mb-3">
        <div style="width:52px;height:52px;border-radius:14px;background:var(--gradient-2);color:#fff;display:grid;place-items:center;font-weight:800;flex-shrink:0">${c.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <div style="flex:1;min-width:0"><div class="font-bold">${PDMS.esc(c.name)}</div><div class="text-sm text-muted">${PDMS.esc(c.industry)}</div></div>
      </div>
      <div class="flex flex-col gap-2" style="border-top:1px solid var(--border);padding-top:12px">
        <div class="flex items-center gap-2 text-sm"><span class="text-muted" style="width:20px">${I('mail')}</span><span>${PDMS.esc(c.email||'—')}</span></div>
        <div class="flex items-center gap-2 text-sm"><span class="text-muted" style="width:20px">${I('phone')}</span><span>${PDMS.esc(c.phone||'—')}</span></div>
        <div class="flex items-center gap-2 text-sm"><span class="text-muted" style="width:20px">${I('globe')}</span><span>${PDMS.esc(c.address||'—')}</span></div>
      </div>
    </div></div>`).join('') || `<div class="text-muted" style="padding:24px;text-align:center;grid-column:1/-1">No clients yet</div>`}</div>`;
}
PDMS.onRefresh(render);
function openClientModal(){
  const modal = PDMS.modal('New Client',`
    <div class="form-row"><label>Industry Name</label><input id="newClientName"/></div>
    <div class="form-row"><label>Industry Type</label><input id="newClientIndustry"/></div>
    <div class="form-row"><label>Email</label><input id="newClientEmail" type="email"/></div>
    <div class="form-row"><label>Phone</label><input id="newClientPhone"/></div>
    <div class="form-row"><label>Address</label><input id="newClientAddress" placeholder="Street, City, Country"/></div>
  `,`<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveClientBtn">Create Client</button>`);
  modal.querySelector('#saveClientBtn').onclick = function(){
    const name = modal.querySelector('#newClientName').value.trim();
    const industry = modal.querySelector('#newClientIndustry').value.trim();
    const email = modal.querySelector('#newClientEmail').value.trim().toLowerCase();
    const phone = modal.querySelector('#newClientPhone').value.trim();
    const address = modal.querySelector('#newClientAddress').value.trim();
    if(!name || !industry){
      PDMS.toast('Missing info','Industry name and industry type are required','error');
      return;
    }
    PDMS.api.create('clients',{name,industry,email,phone,address,projects:0}).then(()=>{
      modal.remove();
      PDMS.toast('Client created','New client added','success');
      location.reload();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not create client','error'));
  };
}
</script></body></html>
