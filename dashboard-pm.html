<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PM Dashboard — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('dashboard');
const D=PDMS_DATA;const I=PDMS.icon;
const my = D.projects.slice(0,8);
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Dashboard</span><span>Project Management</span></div>
    <h1 class="page-title">Project Management</h1><div class="page-sub">Your active engagements and tasks</div></div></div>
  <div class="grid grid-4 mb-4">
    ${[['My Projects','12','primary'],['Tasks Due','24','warn'],['On Track','9','success'],['At Risk','3','info']].map(([k,v,c])=>`
      <div class="stat i-${c}"><div class="label">${k}</div><div class="value">${v}</div><div class="icon-wrap">${I('briefcase')}</div></div>`).join('')}
  </div>
  <div class="card"><div class="card-head"><div class="card-title">My Active Projects</div><a class="btn btn-secondary btn-sm" href="projects.html">View all</a></div>
    <div class="card-body" style="padding:0">${my.map(p=>`
      <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:center">
        <div class="ring" style="--p:${p.progress};--sz:52px;--th:6px"><span class="ring-val" style="font-size:12px">${p.progress}%</span></div>
        <div style="flex:1"><div class="font-semi"><a href="project-details.html?id=${p.id}" style="color:inherit">${PDMS.esc(p.name)}</a></div><div class="text-sm text-muted">${PDMS.esc(p.client)} • Due ${p.due}</div></div>
        <span class="badge ${D.prioColors[p.priority]}">${p.priority}</span>
        <span class="badge badge-${D.statusColors[p.status]}">${p.status}</span>
      </div>`).join('')}</div></div>`;
</script></body></html>
