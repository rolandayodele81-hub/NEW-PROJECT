<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Settings — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('settings');
const I=PDMS.icon;
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Home</span><span>Settings</span></div>
    <h1 class="page-title">Settings</h1><div class="page-sub">System, security and workspace configuration</div></div></div>
  <div class="grid grid-2">
    <div class="card"><div class="card-head"><div class="card-title">General</div></div>
      <div class="card-body">
        <div class="form-row"><label>Organization Name</label><input placeholder="Your company name"/></div>
        <div class="form-row"><label>Default Currency</label><select><option>USD</option><option>NGN</option><option>EUR</option></select></div>
        <div class="form-row"><label>Time Zone</label><select><option>Africa/Lagos (GMT+1)</option></select></div>
        <button class="btn btn-primary" onclick="PDMS.toast('Saved','Settings updated','success')">Save Changes</button>
      </div>
    </div>
    <div class="card"><div class="card-head"><div class="card-title">Security</div></div>
      <div class="card-body">
        <div class="flex justify-between items-center mb-3"><div><div class="font-semi">Two-Factor Authentication</div><div class="text-sm text-muted">Extra layer of security</div></div><label style="position:relative;display:inline-block;width:44px;height:24px"><input type="checkbox" checked style="opacity:0;width:0;height:0"><span style="position:absolute;inset:0;background:var(--primary);border-radius:24px"></span></label></div>
        <div class="flex justify-between items-center mb-3"><div><div class="font-semi">Session Timeout</div><div class="text-sm text-muted">Auto-logout after inactivity</div></div><select class="select"><option>30 min</option><option>1 hr</option><option>4 hr</option></select></div>
        <button class="btn btn-secondary">${I('shield')} Security Audit</button>
      </div>
    </div>
    <div class="card"><div class="card-head"><div class="card-title">Roles & Permissions</div></div>
      <div class="card-body">${PDMS_DATA.roles.map(r=>`<div class="flex justify-between items-center" style="padding:10px 0;border-bottom:1px solid var(--border)"><span class="font-semi">${r}</span><span class="badge badge-primary">${Math.floor(Math.random()*15+5)} permissions</span></div>`).join('')}</div>
    </div>
    <div class="card"><div class="card-head"><div class="card-title">Backup & Restore</div></div>
      <div class="card-body">
        <div class="text-muted text-sm mb-3">Last backup: 2 hours ago (Automated)</div>
        <div class="flex gap-2"><button class="btn btn-primary">${I('download')} Backup Now</button><button class="btn btn-secondary">${I('upload')} Restore</button></div>
      </div>
    </div>
  </div>`;
</script></body></html>
