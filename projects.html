<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Projects — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/permissions.js"></script><script src="js/app.js"></script>
<script>
// A hash (not a query string) survives any host's clean-URL rewriting untouched,
// since it's never sent to the server — unlike ?view=, which some static hosts strip.
const viewParam = new URLSearchParams(location.hash.replace(/^#/,'')).get('view');
window.addEventListener('hashchange', ()=>location.reload());

const activeNavId = viewParam==='sales' ? 'sales-pipeline' : viewParam==='delivery' ? 'delivery-projects' : 'projects';
PDMS.mountShell(activeNavId);
const D = PDMS_DATA; const I = PDMS.icon;
const currentUser = PDMS.getUser();

const pageInfo = viewParam==='sales' ? {title:'Sales Pipeline', sub:'Projects created by Sales, from first contact to client approval'}
  : viewParam==='delivery' ? {title:'Projects in Delivery', sub:'Projects created directly by the delivery team (COO/HTD/PM Head/PMO)'}
  : {title:'Projects', sub:'Manage all engagements across the organization'};

// Bucketing is by WHO created the project, not its current status — a project
// created by Sales stays in Sales Pipeline for its whole life; a project created
// by a delivery role stays in Projects in Delivery for its whole life.
function scopedProjects(){
  if(viewParam==='sales') return D.projects.filter(p=>p.createdByRole==='Sales');
  if(viewParam==='delivery') return D.projects.filter(p=>PDMS.isDeliveryRole({role:p.createdByRole}));
  return D.projects;
}
// Each bucket is filtered/kanban'd using its own status vocabulary.
const bucketStatuses = viewParam==='sales' ? D.salesStatuses : viewParam==='delivery' ? D.deliveryStatuses : D.statuses;
const kanbanStatuses = viewParam==='sales' ? D.salesStatuses : viewParam==='delivery' ? D.deliveryStatuses : ['Incoming','In Progress','Awaiting Review','Completed'];
const statTiles = viewParam==='sales'
  ? [{label:'Total', match:()=>true, color:'primary', icon:'folder'}, {label:'Awaiting Approval', match:p=>p.status==='Awaiting Client Approval', color:'warn', icon:'clock'}, {label:'Approved', match:p=>p.status==='Approved', color:'success', icon:'check'}, {label:'Rejected', match:p=>p.status==='Rejected', color:'info', icon:'zap'}]
  : viewParam==='delivery'
  ? [{label:'Total', match:()=>true, color:'primary', icon:'folder'}, {label:'In Progress', match:p=>p.status==='In Progress', color:'warn', icon:'activity'}, {label:'Completed', match:p=>p.status==='Completed', color:'success', icon:'check'}, {label:'On Hold', match:p=>p.status==='On Hold', color:'info', icon:'zap'}]
  : [{label:'Total', match:()=>true, color:'primary', icon:'folder'}, {label:'In Progress', match:p=>p.status==='In Progress', color:'warn', icon:'activity'}, {label:'Completed', match:p=>p.status==='Completed', color:'success', icon:'check'}, {label:'Incoming', match:p=>p.status==='Incoming', color:'info', icon:'zap'}];

// Sales can view the delivery bucket but never create there — only a delivery
// role creates projects that belong in Projects in Delivery.
const canCreateHere = viewParam==='sales' ? PDMS.isSalesRole(currentUser)
  : viewParam==='delivery' ? PDMS.isDeliveryRole(currentUser)
  : PDMS.can('Create Project');

// Sales Pipeline and Projects in Delivery default to Table view; the plain
// Projects page (used by delivery roles day-to-day) defaults to Kanban.
const defaultToTable = viewParam==='sales' || viewParam==='delivery';

const content = document.getElementById('content');
content.innerHTML = `
  <div class="page-head">
    <div><div class="breadcrumbs"><span>Home</span><span>Projects</span></div>
      <h1 class="page-title">${pageInfo.title}</h1><div class="page-sub">${pageInfo.sub}</div></div>
    <div class="flex gap-2"><button class="btn btn-secondary" id="viewToggle">${defaultToTable ? I('folder')+' Kanban View' : I('folder')+' Table View'}</button>${canCreateHere?`<button class="btn btn-primary" id="newProj">${I('plus')} New Project</button>`:''}</div>
  </div>
  <div class="grid grid-4 mb-4">
    ${statTiles.map((t,i)=>`<div class="stat i-${t.color}"><div class="label">${t.label}</div><div class="value" id="stat-${i}">0</div><div class="icon-wrap">${I(t.icon)}</div></div>`).join('')}
  </div>
  <div id="listView" class="table-wrap ${defaultToTable ? '' : 'hidden'}"></div>
  <div id="kanbanView" class="${defaultToTable ? 'hidden' : ''}"></div>
`;

const columns = [
  {key:'name',label:'Project Name',render:r=>`<div class="font-semi" style="color:var(--primary)">${PDMS.esc(r.name)}</div><div class="text-sm text-muted">${PDMS.esc(r.type)}</div>`},
  {key:'client',label:'Client'},
  {key:'priority',label:'Priority',render:r=>`<span class="badge ${D.prioColors[r.priority]}">${r.priority}</span>`},
  {key:'status',label:'Status',render:r=>`<span class="badge badge-${D.statusColors[r.status]||'muted'}">${r.status}</span>`},
  {key:'due',label:'Due'}
];
function renderStats(rows){
  statTiles.forEach((t,i)=>{ document.getElementById('stat-'+i).textContent = rows.filter(t.match).length; });
}
function renderProjects(){
  const rows = scopedProjects();
  renderStats(rows);
  PDMS.renderTable(document.getElementById('listView'),{
    columns, rows, pageSize:12,
    searchKeys:['id','name','client','pm','status','type'],
    rowHref:r=>'project-details.html?id='+r.id,
    filterOptions:[
      {key:'status',label:'Status',options:bucketStatuses},
      {key:'priority',label:'Priority',options:D.priorities}
    ]
  });
  document.getElementById('kanbanView').innerHTML = `<div class="kanban">${kanbanStatuses.map(s=>`
    <div class="kb-col"><div class="kb-head"><span class="kb-title">${s}</span><span class="badge badge-muted">${rows.filter(p=>p.status===s).length}</span></div>
      ${rows.filter(p=>p.status===s).slice(0,8).map(p=>`<div class="kb-card" onclick="location.href='project-details.html?id=${p.id}'">
        <div class="t">${PDMS.esc(p.name)}</div>
        <div class="progress mb-2"><div class="bar" style="width:${p.progress}%"></div></div>
        <div class="m"><span class="badge ${D.prioColors[p.priority]}">${p.priority}</span><span>${p.due}</span></div>
      </div>`).join('')}
    </div>`).join('')}</div>`;
}
PDMS.onRefresh(renderProjects);
document.getElementById('viewToggle').onclick = ()=>{
  const lv=document.getElementById('listView'),kv=document.getElementById('kanbanView');
  lv.classList.toggle('hidden');kv.classList.toggle('hidden');
  document.getElementById('viewToggle').innerHTML = (lv.classList.contains('hidden')?I('folder')+' Table View':I('folder')+' Kanban View');
};

if(document.getElementById('newProj')) document.getElementById('newProj').onclick = ()=>{
  const createdByRole = viewParam==='sales' ? 'Sales' : viewParam==='delivery' ? currentUser.role : currentUser.role;
  const stage = viewParam==='sales' ? 'Sales' : viewParam==='delivery' ? 'Delivery' : PDMS.stageFor(currentUser);
  const statusOptions = viewParam==='sales' ? D.salesStatuses : viewParam==='delivery' ? D.deliveryStatuses : PDMS.statusOptionsFor(currentUser);
  const defaultStatus = statusOptions[0];
  const modal = PDMS.modal('Create New Project',`
    <div class="form-grid">
      <div class="form-row"><label>Project Name</label><input id="newProjName" placeholder="e.g. Falcon Migration"/></div>
      <div class="form-row"><label>Client</label><input id="newProjClient" type="text" placeholder="e.g. Zenith Robotics" list="clientOptions"/><datalist id="clientOptions">${D.clients.map(c=>`<option value="${PDMS.esc(c.name)}">`).join('')}</datalist></div>
      <div class="form-row"><label>Type</label><input id="newProjType" type="text" placeholder="e.g. Software Development"/></div>
      <div class="form-row"><label>Priority</label><select id="newProjPriority">${D.priorities.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="form-row"><label>Status</label><select id="newProjStatus">${statusOptions.map(s=>`<option${s===defaultStatus?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-row"><label>Start Date</label><input id="newProjStart" type="date"/></div>
      <div class="form-row"><label>Due Date</label><input id="newProjDue" type="date"/></div>
      <div class="form-row"><label>Department</label><input id="newProjDept" type="text" placeholder="e.g. Cloud Engineering"/></div>
    </div>
    <div class="form-row"><label>Description</label><textarea id="newProjDesc" rows="3" placeholder="Scope, goals, deliverables..."></textarea></div>
  `,`<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="createProjectBtn">Create Project</button>`);
  modal.querySelector('#createProjectBtn').onclick = function(){
    const name = modal.querySelector('#newProjName').value.trim();
    const clientTyped = modal.querySelector('#newProjClient').value.trim();
    const type = modal.querySelector('#newProjType').value.trim();
    const priority = modal.querySelector('#newProjPriority').value;
    const status = modal.querySelector('#newProjStatus').value;
    const start = modal.querySelector('#newProjStart').value;
    const due = modal.querySelector('#newProjDue').value;
    const dept = modal.querySelector('#newProjDept').value.trim();
    const desc = modal.querySelector('#newProjDesc').value.trim();
    if(!name || !clientTyped){
      PDMS.toast('Missing project info','Project name and client are required','error');
      return;
    }
    const btn = this;
    PDMS.setButtonLoading(btn, true, 'Creating...');
    setTimeout(()=>PDMS.setButtonLoading(btn, false), 10000);
    // Match an existing client case-insensitively (so casing typos don't fork
    // a project onto a duplicate client); auto-create the client if it's new.
    const existingClient = D.clients.find(cl=>cl.name.toLowerCase()===clientTyped.toLowerCase());
    const ensureClient = existingClient ? Promise.resolve(existingClient) : PDMS.api.create('clients',{name:clientTyped, industry:'', email:'', phone:'', address:'', projects:0});
    ensureClient.then(client=>{
      if(!existingClient) D.clients.unshift(client);
      const record = {
        name, client:client.name, type, dept, sales:'Sales Team', pm:'TBD', lead:'TBD', consultants:[],
        priority, status, stage, createdByRole, progress:0, start:start||'', due:due||'', completion:null,
        description:desc, files:0, remarks:0
      };
      return PDMS.api.create('projects',record);
    }).then(saved=>{
      D.projects.unshift(saved);
      modal.remove();
      PDMS.toast('Project created','New project added to pipeline','success');
      renderProjects();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not create project','error'));
  };
};

function editProject(id){
  const project = D.projects.find(p=>p.id===id);
  if(!project){ return; }
  const modal = PDMS.modal('Edit Project',`
    <div class="form-grid">
      <div class="form-row"><label>Project Name</label><input id="editProjName" value="${PDMS.esc(project.name)}"/></div>
      <div class="form-row"><label>Client</label><input id="editProjClient" type="text" value="${PDMS.esc(project.client||'')}" list="editClientOptions"/><datalist id="editClientOptions">${D.clients.map(c=>`<option value="${PDMS.esc(c.name)}">`).join('')}</datalist></div>
      <div class="form-row"><label>Type</label><input id="editProjType" type="text" value="${PDMS.esc(project.type||'')}"/></div>
      <div class="form-row"><label>Priority</label><select id="editProjPriority">${D.priorities.map(p=>`<option${p===project.priority?' selected':''}>${p}</option>`).join('')}</select></div>
      <div class="form-row"><label>Start Date</label><input id="editProjStart" type="date" value="${PDMS.esc(project.start)}"/></div>
      <div class="form-row"><label>Due Date</label><input id="editProjDue" type="date" value="${PDMS.esc(project.due)}"/></div>
      <div class="form-row"><label>Department</label><input id="editProjDept" type="text" value="${PDMS.esc(project.dept||'')}"/></div>
    </div>
    <div class="form-row"><label>Description</label><textarea id="editProjDesc" rows="3">${PDMS.esc(project.description)}</textarea></div>
  `,`<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="saveProjectChangesBtn">Save changes</button>`);
  modal.querySelector('#saveProjectChangesBtn').onclick = function(){
    const clientTyped = modal.querySelector('#editProjClient').value.trim();
    const existingClient = D.clients.find(cl=>cl.name.toLowerCase()===clientTyped.toLowerCase());
    const ensureClient = existingClient ? Promise.resolve(existingClient) : PDMS.api.create('clients',{name:clientTyped, industry:'', email:'', phone:'', address:'', projects:0});
    ensureClient.then(client=>{
      if(!existingClient) D.clients.unshift(client);
      const patch = {
        name:modal.querySelector('#editProjName').value.trim(),
        client:client.name,
        type:modal.querySelector('#editProjType').value.trim(),
        priority:modal.querySelector('#editProjPriority').value,
        start:modal.querySelector('#editProjStart').value,
        due:modal.querySelector('#editProjDue').value,
        dept:modal.querySelector('#editProjDept').value.trim(),
        description:modal.querySelector('#editProjDesc').value.trim()
      };
      return PDMS.api.update('projects',project.id,patch);
    }).then(saved=>{
      Object.assign(project,saved);
      modal.remove();
      PDMS.toast('Project updated','Project details were saved','success');
      renderProjects();
    }).catch(err=>PDMS.toast('Error',err.message||'Could not update project','error'));
  };
}
window.editProject = editProject;
</script></body></html>
