<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HR Dashboard — PSE PDMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/></head><body>
<script src="js/config.js"></script><script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
PDMS.mountShell('dashboard');
const D=PDMS_DATA;const I=PDMS.icon;
document.getElementById('content').innerHTML=`
  <div class="page-head"><div><div class="breadcrumbs"><span>Dashboard</span><span>HR</span></div>
    <h1 class="page-title">HR Dashboard</h1><div class="page-sub">People operations, availability and workload</div></div>
    <button class="btn btn-primary" onclick="location.href='users.html'">${I('user-plus')} Manage Staff</button></div>
  <div class="grid grid-4 mb-4">
    <div class="stat i-primary"><div class="label">Total Staff</div><div class="value">${D.users.length}</div><div class="icon-wrap">${I('users')}</div></div>
    <div class="stat i-success"><div class="label">Active</div><div class="value">${D.users.filter(u=>u.status==='Active').length}</div><div class="icon-wrap">${I('check')}</div></div>
    <div class="stat i-warn"><div class="label">On Leave</div><div class="value">${D.users.filter(u=>u.status==='On Leave').length}</div><div class="icon-wrap">${I('clock')}</div></div>
    <div class="stat i-info"><div class="label">New Hires</div><div class="value">6</div><div class="icon-wrap">${I('user-plus')}</div></div>
  </div>
  <div class="grid grid-2 mb-4">
    <div class="card"><div class="card-head"><div class="card-title">Workload Distribution</div></div>
      <div class="card-body"><div class="chart-wrap" style="height:260px"><canvas id="c1"></canvas></div></div></div>
    <div class="card"><div class="card-head"><div class="card-title">Top Workload</div></div>
      <div class="card-body" style="padding:8px 20px">${D.users.slice().sort((a,b)=>b.workload-a.workload).slice(0,6).map(u=>`
        <div class="flex items-center gap-3" style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="avatar avatar-sm">${PDMS.initials(u.name)}</div>
          <div style="flex:1"><div class="font-semi text-sm">${PDMS.esc(u.name)}</div><div class="text-sm text-muted">${PDMS.esc(u.role)}</div></div>
          <div style="width:140px" class="progress-inline"><div class="progress"><div class="bar" style="width:${u.workload}%"></div></div><span class="pct">${u.workload}%</span></div>
        </div>`).join('')}</div></div>
  </div>`;
PDMS.charts.bar(document.getElementById('c1'),[45,72,58,89,66,50,84],['HR','HTD','COO','PM','Sales','Consultants','Eng'],'#8b5cf6');
</script></body></html>
